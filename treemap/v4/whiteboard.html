<!doctype html>
<html lang="de">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1"
        />
        <title>Whiteboard – Treemap v4</title>

        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

        <link
            rel="stylesheet"
            href="../../assets/css/style.css"
        />
        <link
            rel="stylesheet"
            href="../../assets/css/treemap.css"
        />
        <link
            href="https://fonts.googleapis.com/icon?family=Material+Icons"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined"
            rel="stylesheet"
        />

        <style>
            html,
            body {
                height: 100%;
                margin: 0;
            }

            body {
                overflow: hidden;
            }

            #main-content:focus,
            #canvas:focus {
                outline: none;
            }

            :root {
                --v4-connbar-h: 1.5rem;
            }

            .v4-btn {
                display: inline-flex;
                align-items: center;
                gap: 0.25rem;
                padding: 0.35rem 0.5rem;
                border-radius: 0.375rem;
                border: 1px solid currentColor;
                background: transparent;
                color: inherit;
                cursor: pointer;
                text-decoration: none;
            }

            .v4-btn:hover {
                background: rgba(255, 255, 255, 0.12);
            }

            .v4-btn:active {
                background: rgba(255, 255, 255, 0.2);
                transform: translateY(1px);
            }

            .v4-btn:focus-visible {
                outline: 2px solid rgba(255, 255, 255, 0.9);
                outline-offset: 2px;
            }

            .v4-btn:focus {
                outline: 2px solid rgba(255, 255, 255, 0.9);
                outline-offset: 2px;
            }

            .v4-status {
                font-size: inherit;
                opacity: 0.95;
            }

            /* Connection bar (sticky, one-line) */
            .v4-connbar {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 2000;
                display: flex;
                flex-direction: row;
                flex-wrap: nowrap;
                gap: 0.35rem;
                align-items: center;
                justify-content: center;
                height: var(--v4-connbar-h);
                padding: 0 0.4rem;
                background: rgba(0, 0, 0, 0.85);
                color: white;
                border-bottom: 1px solid rgba(255, 255, 255, 0.15);
                overflow: hidden;
                box-sizing: border-box;
                line-height: 1;
                font-size: 0.85rem;
            }

            .v4-connbar__group {
                display: inline-flex;
                align-items: center;
                gap: 0.35rem;
                white-space: nowrap;
                flex: 0 1 auto;
                min-width: 0;
            }

            .v4-connbar__sep {
                width: 1px;
                height: 0.9rem;
                background: rgba(255, 255, 255, 0.25);
                flex: 0 0 auto;
                opacity: 0.9;
            }

            .v4-connbar__label {
                font-size: inherit;
                opacity: 0.95;
            }

            .v4-connbar input {
                height: var(--v4-connbar-h);
                padding: 0 0.35rem;
                border-radius: 0.3rem;
                border: 1px solid rgba(255, 255, 255, 0.25);
                background: rgba(255, 255, 255, 0.08);
                color: inherit;
                font: inherit;
                flex: 1 1 auto;
                min-width: 6ch;
                width: clamp(8ch, 12vw, 18ch);
            }

            .v4-connbar__group[data-group="ws"] input {
                width: clamp(14ch, 22vw, 30ch);
            }

            .v4-connbar__dot {
                width: 0.6rem;
                height: 0.6rem;
                border-radius: 999px;
                border: 1px solid rgba(255, 255, 255, 0.35);
                background: rgba(255, 255, 255, 0.15);
                box-sizing: border-box;
            }
            .v4-connbar__dot[data-state="connected"] {
                background: rgba(255, 255, 255, 0.9);
            }
            .v4-connbar__dot[data-state="connecting"] {
                background: rgba(255, 255, 255, 0.5);
            }

            .v4-connbar__icon-btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: var(--v4-connbar-h);
                height: var(--v4-connbar-h);
                border-radius: 0.3rem;
                border: 1px solid rgba(255, 255, 255, 0.2);
                background: rgba(255, 255, 255, 0.08);
                color: inherit;
                cursor: pointer;
            }

            .v4-connbar__icon-btn:focus,
            .v4-connbar__icon-btn:focus-visible {
                outline: 2px solid rgba(255, 255, 255, 0.9);
                outline-offset: 2px;
            }

            .v4-connbar .material-icons {
                font-size: 1rem;
                line-height: 1;
            }

            .v4-connbar .v4-btn {
                height: var(--v4-connbar-h);
                padding: 0 0.4rem;
                border-radius: 0.3rem;
                font: inherit;
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .v4-connbar__group[data-group="info"] .v4-status {
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .v4-connbar__group[data-group="info"] #status {
                flex: 0 1 auto;
            }

            .v4-connbar__group[data-group="info"] #summary {
                flex: 1 1 auto;
            }

            .v4-connbar__group[data-group="info"] #themes {
                flex: 1 1 auto;
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .v4-connbar__group[data-size="compact"] .v4-connbar__label {
                display: none;
            }

            .v4-connbar__group[data-size="compact"] input {
                width: clamp(6ch, 10vw, 12ch);
            }
            .v4-connbar__group[data-size="compact"][data-group="ws"] input {
                width: clamp(10ch, 16vw, 18ch);
            }
            .v4-connbar__group[data-size="compact"][data-group="info"]
                #summary {
                display: none;
            }
            .v4-connbar__group[data-size="compact"][data-group="info"] #themes {
                display: none;
            }

            #wb-centerbar {
                position: absolute;
                left: 50%;
                top: 12px;
                transform: translateX(-50%);
                z-index: 3;
                display: inline-flex;
                align-items: center;
                gap: 0.35rem;
                padding: 0.25rem 0.5rem;
                border-radius: 0.375rem;
                backdrop-filter: blur(2px);
                max-width: min(92vw, 60rem);
                box-sizing: border-box;
            }

            #wb-centerbar #themes {
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            #wb-toolbar {
                position: absolute;
                right: 12px;
                top: 12px;
                z-index: 3;
                display: inline-flex;
                align-items: center;
                gap: 0.35rem;
                padding: 0.25rem;
                border-radius: 0.375rem;
                backdrop-filter: blur(2px);
                box-sizing: border-box;
            }

            #align-menu {
                display: none;
                align-items: center;
                gap: 0.25rem;
                flex: 0 0 auto;
            }

            #align-menu[data-visible="true"] {
                display: inline-flex;
            }

            #wb-selection-box {
                position: absolute;
                border: 2px dashed rgba(255, 255, 255, 0.6);
                background: rgba(255, 255, 255, 0.06);
                pointer-events: none;
                z-index: 10001;
                display: none;
            }

            #wb-contextmenu {
                position: fixed;
                z-index: 5000;
                min-width: 12rem;
                background: rgba(0, 0, 0, 0.92);
                color: white;
                border: 1px solid rgba(255, 255, 255, 0.25);
                border-radius: 0.375rem;
                padding: 0.25rem;
                display: none;
                box-sizing: border-box;
            }

            #wb-contextmenu button {
                width: 100%;
                text-align: left;
                background: transparent;
                color: inherit;
                border: none;
                padding: 0.4rem 0.5rem;
                border-radius: 0.25rem;
                cursor: pointer;
                font: inherit;
            }

            #wb-contextmenu button:hover,
            #wb-contextmenu button:focus-visible {
                background: rgba(255, 255, 255, 0.12);
                outline: none;
            }

            #wb-contextmenu button:focus {
                background: rgba(255, 255, 255, 0.12);
                outline: none;
            }

            .board-item.is-selected .card,
            .board-item.is-selected .wb-text-frame {
                outline: none;
            }

            .board-item.is-selected .wb-text-frame {
                position: relative;
            }

            .board-item.is-selected .card::before,
            .board-item.is-selected .wb-text-frame::before {
                content: "";
                position: absolute;
                inset: 0;
                border-radius: inherit;
                background: rgba(255, 255, 255, 0.25);
                opacity: 0.75;
                pointer-events: none;
            }

            #canvas .card:focus,
            #canvas .card:focus-visible {
                outline: none;
            }

            #wb-selection-overlays {
                position: absolute;
                inset: 0;
                z-index: 10000;
                pointer-events: none;
            }

            .wb-selection-overlay {
                position: absolute;
                border: 3px solid var(--primary-focus-color);
                border-radius: 0.5rem;
                box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.25);
                box-sizing: border-box;
                pointer-events: none;
                will-change: transform, width, height;
            }

            .board-item.is-locked {
                opacity: 0.55;
            }

            .board-item.is-locked textarea {
                pointer-events: none;
            }
            #canvas {
                position: fixed;
                inset: 0;
                top: var(--v4-connbar-h);
                overflow: hidden;
            }

            #wb-items {
                position: absolute;
                inset: 0;
                z-index: 2;
                transform-origin: 0 0;
                will-change: transform;
            }

            #wb-connections {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                display: block;
                z-index: 0;
                pointer-events: none;
                overflow: visible;
            }

            #wb-connections line {
                stroke: rgba(255, 255, 255, 0.5);
                stroke-width: 2;
                vector-effect: non-scaling-stroke;
            }

            #zoom-label {
                font-size: 0.85rem;
                opacity: 0.95;
                min-width: 5ch;
                text-align: right;
            }
            #board-title {
                position: absolute;
                left: 12px;
                top: 12px;
                pointer-events: none;
                z-index: 6;
                padding: 0.25rem 0.5rem;
                border-radius: 0.375rem;
                backdrop-filter: blur(2px);
                background-color: var(--surface);
                color: var(--text-primary, white);
                border: 2px solid rgba(255, 255, 255, 0.5);
            }
            .board-item {
                position: absolute;
                width: 180px;
                touch-action: none;
                user-select: none;
                z-index: 2;
            }

            .board-item.board-text {
                width: 320px;
                touch-action: auto;
                user-select: text;
            }

            .board-item.board-text * {
                user-select: text;
            }

            .board-item .card {
                cursor: grab;
                hyphens: auto;
                -webkit-hyphens: auto;
                overflow-wrap: anywhere;
                word-break: normal;
            }
            .board-item.dragging .card {
                cursor: grabbing;
                opacity: 0.9;
            }

            .wb-theme-card {
                gap: 0.5rem;
                padding: 0.75rem;
                border: 2px solid rgba(255, 255, 255, 0.5);
                background-color: var(--surface);
                color: var(--text-primary, white);
                position: relative;
            }

            .wb-theme-card-title {
                font-weight: 700;
                font-size: 1.45rem;
                line-height: 1.2;
                word-break: break-word;
                text-align: center;
                position: absolute;
                inset: 0.9rem 0.75rem 1.65rem 0.75rem;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .wb-theme-toggle {
                position: absolute;
                top: 0.35rem;
                left: 50%;
                transform: translateX(-50%);
                padding: 0.15rem 0.35rem;
                border: none;
                background: transparent;
            }

            .wb-theme-toggle .material-icons {
                font-size: 1.25rem;
                line-height: 1;
            }

            .wb-theme-rename {
                position: absolute;
                top: 0.35rem;
                left: 0.35rem;
                width: 1.85rem;
                height: 1.85rem;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                padding: 0;
                border-radius: 999px;
                border: none;
                background: transparent;
                color: inherit;
                cursor: pointer;
            }

            .wb-theme-rename:hover {
                background: rgba(255, 255, 255, 0.16);
            }

            .wb-theme-rename:active {
                background: rgba(255, 255, 255, 0.22);
                transform: translateY(1px);
            }

            .wb-theme-rename:focus-visible {
                outline: 2px solid rgba(255, 255, 255, 0.9);
                outline-offset: 2px;
            }

            .wb-theme-rename .material-icons {
                font-size: 1.1rem;
                line-height: 1;
            }

            .wb-info-btn {
                position: absolute;
                top: 0.35rem;
                right: 0.35rem;
                width: 1.85rem;
                height: 1.85rem;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                padding: 0;
                border-radius: 999px;
                border: none;
                background: transparent;
                color: inherit;
                cursor: pointer;
            }

            .wb-info-btn:hover {
                background: rgba(255, 255, 255, 0.16);
            }

            .wb-info-btn:active {
                background: rgba(255, 255, 255, 0.22);
                transform: translateY(1px);
            }

            .wb-info-btn:focus-visible {
                outline: 2px solid rgba(255, 255, 255, 0.9);
                outline-offset: 2px;
            }

            .wb-info-btn .material-icons,
            .wb-info-btn .material-icons-outlined {
                font-size: 1.1rem;
                line-height: 1;
            }

            .wb-theme-card [data-role="theme-hint"] {
                position: absolute;
                left: 0.75rem;
                right: 0.75rem;
                bottom: 0.4rem;
                text-align: center;
                font-size: 0.9rem;
            }

            .wb-text-frame {
                border: 2px solid rgba(255, 255, 255, 0.5);
                background-color: var(--surface);
                color: var(--text-primary, white);
                border-radius: 0.375rem;
                padding: 0;
                box-sizing: border-box;
            }

            .wb-text-frame textarea {
                width: 100%;
                min-height: 7rem;
                resize: vertical;
                overflow-y: hidden;
                border: none;
                background-color: var(--surface);
                color: inherit;
                font: inherit;
                border-radius: 0.3rem;
                padding: 0.5rem;
                box-sizing: border-box;
            }

            .board-item.board-text .wb-text-frame {
                cursor: grab;
            }

            .board-item.board-text textarea {
                cursor: text;
            }

            .board-item.board-text.dragging .wb-text-frame,
            .board-item.board-text.dragging textarea {
                cursor: grabbing;
            }

            .wb-text-frame textarea:focus-visible {
                outline: 2px solid rgba(255, 255, 255, 0.6);
                outline-offset: 2px;
            }

            .wb-text-frame textarea:focus {
                outline: 2px solid rgba(255, 255, 255, 0.6);
                outline-offset: 2px;
            }

            /* Match Treemap responsive card sizing */
            @media (max-width: 768px) {
                .board-item {
                    width: 150px;
                }

                .board-item.board-text {
                    width: min(92vw, 320px);
                }
            }
        </style>
    </head>
    <body>
        <a
            href="#main-content"
            class="skip-link"
            >Zum Whiteboard springen</a
        >

        <header
            id="v4-connbar"
            class="v4-connbar"
            aria-label="Verbindung"
        >
            <div
                class="v4-connbar__group"
                data-group="status"
                data-size="full"
            >
                <span
                    id="conn-status-dot"
                    class="v4-connbar__dot"
                    data-state="disconnected"
                    aria-hidden="true"
                ></span>
                <span
                    id="conn-status-text"
                    class="v4-connbar__label"
                    >Getrennt</span
                >
            </div>

            <span
                class="v4-connbar__sep"
                aria-hidden="true"
            ></span>

            <div
                class="v4-connbar__group"
                data-group="ws"
                data-size="compact"
            >
                <label
                    class="v4-connbar__label"
                    for="ws-url"
                    >WS</label
                >
                <input
                    id="ws-url"
                    type="url"
                    placeholder="wss://example.org/services/ws"
                />
            </div>

            <span
                class="v4-connbar__sep"
                aria-hidden="true"
            ></span>

            <div
                class="v4-connbar__group"
                data-group="session"
                data-size="compact"
            >
                <label
                    class="v4-connbar__label"
                    for="session-id"
                    >Session</label
                >
                <input
                    id="session-id"
                    type="text"
                    placeholder="team-1"
                />
            </div>

            <span
                class="v4-connbar__sep"
                aria-hidden="true"
            ></span>

            <div
                class="v4-connbar__group"
                data-group="user"
                data-size="compact"
            >
                <label
                    class="v4-connbar__label"
                    for="username"
                    >Name</label
                >
                <input
                    id="username"
                    type="text"
                    placeholder="z.B. Michael"
                />
            </div>

            <span
                class="v4-connbar__sep"
                aria-hidden="true"
            ></span>

            <div
                class="v4-connbar__group"
                data-group="actions"
                data-size="full"
            >
                <button
                    id="connect"
                    class="v4-btn"
                    type="button"
                >
                    Verbinden
                </button>
                <button
                    id="disconnect"
                    class="v4-btn"
                    type="button"
                    hidden
                >
                    Trennen
                </button>
            </div>

            <span
                class="v4-connbar__sep"
                aria-hidden="true"
            ></span>

            <div
                class="v4-connbar__group"
                data-group="info"
                data-size="full"
            >
                <span
                    class="v4-status"
                    id="status"
                    aria-live="polite"
                ></span>
            </div>
        </header>

        <main
            id="main-content"
            tabindex="-1"
        >
            <div
                id="canvas"
                aria-label="Whiteboard Canvas"
            >
                <div
                    id="wb-centerbar"
                    aria-label="Themen und Navigation"
                >
                    <span
                        class="v4-status"
                        id="themes"
                        aria-live="polite"
                    ></span>
                    <a
                        class="v4-btn"
                        href="index.html"
                        >Zur Treemap</a
                    >
                </div>
                <div id="board-title"></div>

                <div
                    id="wb-toolbar"
                    aria-label="Werkzeuge"
                >
                    <button
                        id="add-text-frame"
                        class="v4-btn"
                        type="button"
                    >
                        Text
                    </button>

                    <span
                        class="v4-connbar__sep"
                        aria-hidden="true"
                    ></span>

                    <button
                        id="zoom-out"
                        class="v4-btn"
                        type="button"
                        aria-label="Inhalt verkleinern"
                        title="Zoom -"
                    >
                        −
                    </button>
                    <button
                        id="zoom-reset"
                        class="v4-btn"
                        type="button"
                        aria-label="Zoom zurücksetzen"
                        title="Zoom 100%"
                    >
                        100%
                    </button>
                    <button
                        id="zoom-in"
                        class="v4-btn"
                        type="button"
                        aria-label="Inhalt vergrößern"
                        title="Zoom +"
                    >
                        +
                    </button>
                    <span
                        id="zoom-label"
                        class="v4-status"
                        aria-hidden="true"
                    ></span>

                    <span
                        class="v4-connbar__sep"
                        aria-hidden="true"
                    ></span>

                    <div
                        id="align-menu"
                        aria-label="Ausrichten"
                    >
                        <button
                            class="v4-btn"
                            type="button"
                            id="align-top"
                        >
                            Oben
                        </button>
                        <button
                            class="v4-btn"
                            type="button"
                            id="align-middle-y"
                        >
                            Mitte
                        </button>
                        <button
                            class="v4-btn"
                            type="button"
                            id="align-bottom"
                        >
                            Unten
                        </button>
                        <button
                            class="v4-btn"
                            type="button"
                            id="align-left"
                        >
                            Links
                        </button>
                        <button
                            class="v4-btn"
                            type="button"
                            id="align-middle-x"
                        >
                            Mitte
                        </button>
                        <button
                            class="v4-btn"
                            type="button"
                            id="align-right"
                        >
                            Rechts
                        </button>
                        <button
                            class="v4-btn"
                            type="button"
                            id="distribute-x"
                        >
                            Verteilen
                        </button>
                        <button
                            class="v4-btn"
                            type="button"
                            id="distribute-y"
                        >
                            Verteilen
                        </button>
                    </div>
                </div>

                <svg
                    id="wb-connections"
                    aria-hidden="true"
                    focusable="false"
                ></svg>
                <div id="wb-items"></div>
                <div
                    id="wb-selection-overlays"
                    aria-hidden="true"
                ></div>
                <div id="wb-selection-box"></div>
            </div>
        </main>

        <dialog
            id="sectionModal"
            class="modal"
            aria-labelledby="modalTitle"
        >
            <div class="modal-content">
                <h2
                    id="modalTitle"
                    class="visually-hidden"
                >
                    Details
                </h2>
                <button
                    class="close-button"
                    aria-label="Schließen"
                >
                    &times;
                </button>
                <div id="modalContent"></div>
            </div>
        </dialog>

        <div
            id="wb-contextmenu"
            role="menu"
            aria-label="Kontextmenü"
        >
            <button
                type="button"
                role="menuitem"
                data-action="bring-front"
            >
                Nach vorne
            </button>
            <button
                type="button"
                role="menuitem"
                data-action="bring-forward"
            >
                Eins nach vorne
            </button>
            <button
                type="button"
                role="menuitem"
                data-action="send-backward"
            >
                Eins nach hinten
            </button>
            <button
                type="button"
                role="menuitem"
                data-action="send-back"
            >
                Nach hinten
            </button>
            <button
                type="button"
                role="menuitem"
                data-action="delete"
            >
                Löschen
            </button>
        </div>

        <script type="module">
            import {
                WorkspaceSync,
                getQueryParam,
                guessDefaultWsUrl,
                setQueryParams,
            } from "./assets/js/workspace-sync.js"
            import { loadPruefschritte } from "./assets/js/criteria-loader.js"

            const wsUrlEl = document.querySelector("#ws-url")
            const sessionEl = document.querySelector("#session-id")
            const usernameEl = document.querySelector("#username")
            const connectBtn = document.querySelector("#connect")
            const disconnectBtn = document.querySelector("#disconnect")
            const statusEl = document.querySelector("#status")
            const canvasEl = document.querySelector("#canvas")
            const themesEl = document.querySelector("#themes")
            const boardTitleEl = document.querySelector("#board-title")
            const addTextFrameBtn = document.querySelector("#add-text-frame")
            const itemsLayerEl = document.querySelector("#wb-items")
            const connectionsEl = document.querySelector("#wb-connections")
            const selectionOverlaysEl = document.querySelector(
                "#wb-selection-overlays"
            )
            const zoomOutBtn = document.querySelector("#zoom-out")
            const zoomInBtn = document.querySelector("#zoom-in")
            const zoomResetBtn = document.querySelector("#zoom-reset")
            const zoomLabelEl = document.querySelector("#zoom-label")

            const alignMenuEl = document.querySelector("#align-menu")
            const alignTopBtn = document.querySelector("#align-top")
            const alignMiddleYBtn = document.querySelector("#align-middle-y")
            const alignBottomBtn = document.querySelector("#align-bottom")
            const alignLeftBtn = document.querySelector("#align-left")
            const alignMiddleXBtn = document.querySelector("#align-middle-x")
            const alignRightBtn = document.querySelector("#align-right")
            const distributeXBtn = document.querySelector("#distribute-x")
            const distributeYBtn = document.querySelector("#distribute-y")

            const selectionBoxEl = document.querySelector("#wb-selection-box")
            const contextMenuEl = document.querySelector("#wb-contextmenu")

            const connbarEl = document.querySelector("#v4-connbar")
            const connStatusDotEl = document.querySelector("#conn-status-dot")
            const connStatusTextEl = document.querySelector("#conn-status-text")

            const STORAGE_PREFIX = "a11y-workshop:treemap:v4"

            function safeStorageGet(key) {
                try {
                    return globalThis.localStorage.getItem(key)
                } catch {
                    return null
                }
            }

            function safeSessionGet(key) {
                try {
                    return globalThis.sessionStorage.getItem(key)
                } catch {
                    return null
                }
            }

            function safeStorageSet(key, value) {
                try {
                    globalThis.localStorage.setItem(key, value)
                } catch {
                    // ignore
                }
            }

            function safeSessionSet(key, value) {
                try {
                    globalThis.sessionStorage.setItem(key, value)
                } catch {
                    // ignore
                }
            }

            function safeStorageGetJson(key) {
                const text = safeStorageGet(key)
                if (!text) return null
                try {
                    return JSON.parse(text)
                } catch {
                    return null
                }
            }

            function safeStorageSetJson(key, value) {
                try {
                    safeStorageSet(key, JSON.stringify(value))
                } catch {
                    // ignore
                }
            }

            function debounce(fn, waitMs) {
                let timeout = null
                return (...args) => {
                    if (timeout) globalThis.clearTimeout(timeout)
                    timeout = globalThis.setTimeout(() => fn(...args), waitMs)
                }
            }

            function sessionScopedKey(suffix, sessionId = sessionEl.value) {
                const sid = String(sessionId || "default").trim() || "default"
                return `${STORAGE_PREFIX}:session:${sid}:${suffix}`
            }

            function initialValue(paramName, storageKey, fallback) {
                const fromQuery = getQueryParam(paramName, "")
                if (String(fromQuery || "").trim() !== "") return fromQuery
                const fromStorage = safeStorageGet(storageKey)
                if (String(fromStorage || "").trim() !== "") return fromStorage
                return fallback
            }

            function workspaceStateHasContent(state) {
                if (!state || typeof state !== "object") return false
                const collections = state.collections || {}
                const hasCollections = Object.keys(collections).some((k) => {
                    const arr = collections[k]
                    return Array.isArray(arr) && arr.length
                })
                const items = state.whiteboard?.items || {}
                const hasWhiteboard = Object.keys(items).length > 0
                return Boolean(hasCollections || hasWhiteboard)
            }

            let lastNotifyAt = 0
            let lastNotifyText = ""

            function notify(text) {
                if (!statusEl) return
                const next = String(text || "").trim()
                statusEl.textContent = next
                lastNotifyText = next
                lastNotifyAt = Date.now()
            }

            function notifySaved() {
                const now = Date.now()
                if (
                    lastNotifyText &&
                    lastNotifyText !== "Gespeichert" &&
                    now - lastNotifyAt < 1500
                ) {
                    return
                }
                notify("Gespeichert")
            }

            function setConnectionStatus({ connected, message }) {
                const msg = String(message || "").trim()
                if (connStatusTextEl) {
                    connStatusTextEl.textContent =
                        msg || (connected ? "Verbunden" : "Getrennt")
                }
                if (connectBtn) {
                    connectBtn.hidden = !!connected
                    connectBtn.disabled = !!connected
                }
                if (disconnectBtn) {
                    disconnectBtn.hidden = !connected
                    disconnectBtn.disabled = !connected
                }
                if (connStatusDotEl) {
                    if (connected) {
                        connStatusDotEl.dataset.state = "connected"
                    } else if (msg.toLowerCase().includes("verbinde")) {
                        connStatusDotEl.dataset.state = "connecting"
                    } else {
                        connStatusDotEl.dataset.state = "disconnected"
                    }
                }
            }

            let lastPersistedState = null
            let persistIdleHandle = 0
            let persistTimeout = 0
            let persistSeq = 0

            function persistWorkspaceStateNow(state) {
                lastPersistedState = state
                safeStorageSetJson(sessionScopedKey("workspaceState"), state)
                notifySaved()
            }

            function scheduleWorkspacePersist(state, { source } = {}) {
                const s = source === "state" ? "state" : "op"
                persistSeq += 1
                const mySeq = persistSeq

                // For full snapshots, persist quickly.
                if (s === "state") {
                    if (persistTimeout) globalThis.clearTimeout(persistTimeout)
                    persistTimeout = globalThis.setTimeout(() => {
                        if (mySeq !== persistSeq) return
                        persistTimeout = 0
                        persistWorkspaceStateNow(state)
                    }, 150)
                    return
                }

                // For ops (high frequency), persist only after the UI is idle.
                if (persistTimeout) globalThis.clearTimeout(persistTimeout)
                persistTimeout = globalThis.setTimeout(() => {
                    persistTimeout = 0
                    if (mySeq !== persistSeq) return
                    if (isTypingInTextFrame() || isTypingGracePeriod()) {
                        scheduleWorkspacePersist(state, { source: "op" })
                        return
                    }
                    if (persistIdleHandle) return
                    const run = () => {
                        persistIdleHandle = 0
                        if (mySeq !== persistSeq) return
                        persistWorkspaceStateNow(state)
                    }
                    if (typeof globalThis.requestIdleCallback === "function") {
                        persistIdleHandle = globalThis.requestIdleCallback(
                            run,
                            {
                                timeout: 2000,
                            }
                        )
                    } else {
                        persistIdleHandle = globalThis.setTimeout(run, 0)
                    }
                }, 1200)
            }

            const TAB_CLIENT_ID_KEY = `${STORAGE_PREFIX}:clientId:tab`
            const persistedClientId = safeSessionGet(TAB_CLIENT_ID_KEY)
            const generatedClientId =
                globalThis.crypto &&
                typeof globalThis.crypto.randomUUID === "function"
                    ? globalThis.crypto.randomUUID()
                    : String(Date.now()) +
                      "-" +
                      Math.random().toString(16).slice(2)
            const clientId = persistedClientId || generatedClientId
            safeSessionSet(TAB_CLIENT_ID_KEY, clientId)

            {
                const defaultWsUrl = guessDefaultWsUrl()
                const initialWsUrl = initialValue(
                    "ws",
                    `${STORAGE_PREFIX}:wsUrl`,
                    defaultWsUrl
                )
                const pageHost = globalThis.location?.hostname || ""
                const isLocalHost =
                    pageHost === "localhost" || pageHost === "127.0.0.1"
                wsUrlEl.value =
                    !isLocalHost && /wss?:\/\/localhost\b/i.test(initialWsUrl)
                        ? defaultWsUrl
                        : initialWsUrl
            }
            sessionEl.value = initialValue(
                "session",
                `${STORAGE_PREFIX}:sessionId`,
                "default"
            )
            usernameEl.value = initialValue(
                "name",
                `${STORAGE_PREFIX}:username`,
                ""
            )

            safeStorageSet(`${STORAGE_PREFIX}:wsUrl`, wsUrlEl.value)
            safeStorageSet(`${STORAGE_PREFIX}:sessionId`, sessionEl.value)
            safeStorageSet(`${STORAGE_PREFIX}:username`, usernameEl.value)

            let criteriaById = new Map()

            function closeDetailsModal() {
                const modal = document.getElementById("sectionModal")
                if (!modal) return

                if (typeof modal.close === "function") {
                    try {
                        modal.close()
                        return
                    } catch {
                        // ignore
                    }
                }

                modal.removeAttribute("open")
            }

            async function openDetailsByCriteriaId(criteriaId) {
                const id = String(criteriaId || "").trim()
                if (!id) return

                const modal = document.getElementById("sectionModal")
                const modalContent = document.getElementById("modalContent")
                const modalTitle = document.getElementById("modalTitle")
                if (!modal || !modalContent) return

                const meta = criteriaById.get(id)
                if (modalTitle) {
                    modalTitle.textContent = meta?.title
                        ? `Details: ${meta.title}`
                        : "Details"
                }

                modalContent.innerHTML = "<p>Lade Details …</p>"

                if (typeof modal.showModal === "function") {
                    modal.showModal()
                } else {
                    modal.setAttribute("open", "")
                }

                try {
                    const response = await fetch(
                        `../../assets/data/docs/${id}.md`
                    )
                    const markdown = await response.text()
                    // marked wird per Script-Tag geladen
                    modalContent.innerHTML = globalThis.marked
                        ? globalThis.marked.parse(markdown)
                        : markdown
                } catch (err) {
                    console.error(err)
                    modalContent.innerHTML =
                        "<p>Fehler beim Laden der Details.</p>"
                }
            }

            let latestConnectionPairs = []
            let rafConnectionsHandle = 0

            const savedWorkspaceState = safeStorageGetJson(
                sessionScopedKey("workspaceState")
            )
            const localSeedState = workspaceStateHasContent(savedWorkspaceState)
                ? savedWorkspaceState
                : null

            let isConnected = false
            let didInitialSeedCheck = false

            let knownUsers = new Map()
            let didInitUsers = false
            let lastTotalCollected = 0

            function totalCollected(state) {
                const collections = (state && state.collections) || {}
                let total = 0
                for (const arr of Object.values(collections)) {
                    if (Array.isArray(arr)) total += arr.length
                }
                return total
            }

            function nameForClientId(id) {
                return knownUsers.get(String(id || "")) || ""
            }

            function findBoardItemNodeByKey(key) {
                const k = String(key || "")
                if (!k) return null
                const root = itemsLayerEl || canvasEl
                if (!root) return null
                try {
                    return root.querySelector(
                        `.board-item[data-key="${CSS.escape(k)}"]`
                    )
                } catch {
                    return null
                }
            }

            function applyMoveToDom(key, x, y) {
                const el = findBoardItemNodeByKey(key)
                if (!el) return false
                const nx = Math.round(Math.max(0, Number(x) || 0))
                const ny = Math.round(Math.max(0, Number(y) || 0))
                el.style.left = `${nx}px`
                el.style.top = `${ny}px`
                return true
            }

            function applyZOrderToDom(state) {
                const root = itemsLayerEl || canvasEl
                if (!root) return
                let fallbackZ = 0
                root.querySelectorAll(".board-item").forEach((el) => {
                    const key = String(el.dataset.key || "")
                    if (!key) return
                    el.style.zIndex = String(
                        zIndexForKey(state, key, fallbackZ++)
                    )
                })
            }

            const OP_DOM_HANDLERS = {
                "wb.item.move": (op) => {
                    const ok = applyMoveToDom(op.key, op.x, op.y)
                    if (ok) {
                        scheduleConnectionsRender()
                        scheduleSelectionOverlaysRender()
                    }
                    return ok
                },
                "wb.items.batch": (op) => {
                    const updates = Array.isArray(op.updates) ? op.updates : []
                    let touched = false
                    for (const u of updates) {
                        const ok = applyMoveToDom(u?.key, u?.x, u?.y)
                        touched = touched || ok
                    }
                    if (touched) {
                        scheduleConnectionsRender()
                        scheduleSelectionOverlaysRender()
                    }
                    return touched
                },
                "wb.text.create": (op, state) => {
                    const id = String(op.id || "")
                    if (!id) return false
                    let item = findBoardItemNodeByKey(id)
                    if (!item) item = createTextFrameNode(id)
                    const frame = state?.whiteboard?.textFrames?.[id] || {}
                    updateTextFrameNode(item, id, frame, state)
                    if (!(isTypingInTextFrame() || isTypingGracePeriod())) {
                        scheduleSelectionOverlaysRender()
                    }
                    return true
                },
                "wb.text.set": (op, state) => {
                    const id = String(op.id || "")
                    if (!id) return false
                    const item = findBoardItemNodeByKey(id)
                    if (!item) return false
                    const frame = state?.whiteboard?.textFrames?.[id] || {}
                    updateTextFrameNode(item, id, frame, state)
                    if (!(isTypingInTextFrame() || isTypingGracePeriod())) {
                        scheduleSelectionOverlaysRender()
                    }
                    return true
                },
                "wb.lock": (op, state) => {
                    const id = String(op.id || "")
                    if (!id) return false
                    const item = findBoardItemNodeByKey(id)
                    if (!item) return false
                    const frame = state?.whiteboard?.textFrames?.[id] || {}
                    updateTextFrameNode(item, id, frame, state)
                    if (!(isTypingInTextFrame() || isTypingGracePeriod())) {
                        scheduleSelectionOverlaysRender()
                    }
                    return true
                },
                "wb.zorder.set": (_op, state) => {
                    applyZOrderToDom(state)
                    return true
                },
                "wb.items.delete": (op) => {
                    const keys = Array.isArray(op.keys)
                        ? op.keys.map((k) => String(k || "")).filter(Boolean)
                        : []
                    if (!keys.length) return false

                    const root = itemsLayerEl || canvasEl
                    const removeSingle = (key) => {
                        const node = findBoardItemNodeByKey(key)
                        if (!node) return false
                        node.remove()
                        return true
                    }

                    const removeTheme = (theme) => {
                        if (!root) return false
                        const headerKey = `themeHeader::${theme}`
                        const prefix = `${theme}::`
                        let removed = false
                        root.querySelectorAll(".board-item").forEach((node) => {
                            const nk = String(node?.dataset?.key || "")
                            if (
                                nk === headerKey ||
                                (prefix && nk.startsWith(prefix))
                            ) {
                                node.remove()
                                removed = true
                            }
                        })
                        return removed
                    }

                    let removedAny = false
                    for (const k of keys) {
                        if (k.startsWith("themeHeader::")) {
                            const theme = k.slice("themeHeader::".length)
                            removedAny = removeTheme(theme) || removedAny
                        } else {
                            removedAny = removeSingle(k) || removedAny
                        }
                    }

                    // Local-only selection cleanup.
                    if (selectedKeys.size) {
                        const next = new Set(selectedKeys)
                        let changed = false
                        for (const k of keys) {
                            if (next.has(k)) {
                                next.delete(k)
                                changed = true
                            }
                        }
                        if (changed) {
                            selectedKeys = next
                            applySelectionToDom()
                            persistSelectionState()
                        }
                    }

                    scheduleConnectionsRender()
                    scheduleSelectionOverlaysRender()

                    return removedAny
                },
            }

            function applyOpToDom(op, state) {
                if (!op || typeof op !== "object") return false
                const t = String(op.type || "")
                const handler = OP_DOM_HANDLERS[t]
                if (!handler) return false
                return Boolean(handler(op, state))
            }

            function maybeSeedLocalStateOnFirstConnect(state) {
                if (!isConnected || didInitialSeedCheck) return false
                didInitialSeedCheck = true
                if (localSeedState && !workspaceStateHasContent(state)) {
                    sync.updateState((next) => {
                        Object.assign(next, localSeedState)
                    })
                    return true
                }
                return false
            }

            function maybeNotifyNewCriteria(state, updatedBy) {
                const nextTotal = totalCollected(state)
                if (lastTotalCollected && nextTotal > lastTotalCollected) {
                    const by = String(updatedBy || "").trim()
                    if (by && by !== clientId) {
                        const uname = nameForClientId(by)
                        notify(
                            uname
                                ? `Neues Kriterium hinzugefügt (${uname})`
                                : "Neues Kriterium hinzugefügt"
                        )
                    }
                }
                lastTotalCollected = nextTotal
            }

            const sync = new WorkspaceSync({
                wsUrl: wsUrlEl.value,
                sessionId: sessionEl.value,
                clientId,
                username: usernameEl.value || "Anonym",
                onStatus: ({ connected, message }) => {
                    isConnected = Boolean(connected)
                    setConnectionStatus({ connected, message })
                },
                onUsers: (users) => {
                    const next = new Map(
                        (users || []).map((u) => [
                            String(u.clientId || ""),
                            String(u.username || "").trim(),
                        ])
                    )
                    if (!didInitUsers) {
                        knownUsers = next
                        didInitUsers = true
                        return
                    }
                    if (isConnected && next.size > knownUsers.size) {
                        for (const [cid, uname] of next.entries()) {
                            if (!knownUsers.has(cid)) {
                                notify(
                                    uname
                                        ? `Neuer Teilnehmer: ${uname}`
                                        : "Neuer Teilnehmer"
                                )
                                break
                            }
                        }
                    }
                    knownUsers = next
                },
                onState: ({ state, updatedBy, source, op }) => {
                    if (maybeSeedLocalStateOnFirstConnect(state)) return
                    maybeNotifyNewCriteria(state, updatedBy)

                    // Deletions should persist immediately so a fast reload
                    // cannot resurrect stale localSeedState.
                    if (
                        source === "op" &&
                        String(op?.type || "") === "wb.items.delete"
                    ) {
                        persistWorkspaceStateNow(state)
                    } else {
                        scheduleWorkspacePersist(state, { source })
                    }

                    if (source === "op" && op) {
                        const t = String(op.type || "")
                        const applied = applyOpToDom(op, state)
                        // For deletes, we still want a full reconcile render
                        // (theme deletions affect derived cards + hints).
                        if (applied && t !== "wb.items.delete") return
                    }
                    scheduleRender(state)
                },
            })

            if (localSeedState) {
                sync.state = localSeedState
            }

            let rafRenderHandle = 0
            let latestStateForRender = null
            let pendingFullRenderAfterTyping = false

            let lastDragEndedAt = 0

            let rafSelectionOverlayHandle = 0

            // Local-only selection (not synced).
            let selectedKeys = new Set()
            let lastSelectedKey = ""

            const SELECTION_STORAGE_KEY = "whiteboardSelection"
            const persistSelectionState = debounce(() => {
                safeStorageSetJson(sessionScopedKey(SELECTION_STORAGE_KEY), {
                    keys: Array.from(selectedKeys),
                    lastSelectedKey: String(lastSelectedKey || ""),
                    updatedAt: new Date().toISOString(),
                })
            }, 120)

            function restoreSelectionStateFromStorage() {
                const saved = safeStorageGetJson(
                    sessionScopedKey(SELECTION_STORAGE_KEY)
                )
                const keys = Array.isArray(saved?.keys) ? saved.keys : []
                selectedKeys = new Set(
                    keys.map((k) => String(k || "")).filter(Boolean)
                )
                lastSelectedKey = String(saved?.lastSelectedKey || "")
                applySelectionToDom()
            }

            let isMarqueeSelecting = false
            let marqueeStartClientX = 0
            let marqueeStartClientY = 0
            let marqueeHasMoved = false

            let contextMenuKey = ""

            let zoom = 1
            const MIN_ZOOM = 0.5
            const MAX_ZOOM = 2.5
            const ZOOM_STORAGE_KEY = `${STORAGE_PREFIX}:whiteboardZoom`

            function clampZoom(next) {
                const v = Number(next)
                if (!Number.isFinite(v)) return zoom
                return Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, v))
            }

            function applyZoom() {
                if (!itemsLayerEl) return
                itemsLayerEl.style.transform = `scale(${zoom})`
                const pct = Math.round(zoom * 100)
                if (zoomResetBtn) zoomResetBtn.textContent = `${pct}%`
                if (zoomLabelEl) zoomLabelEl.textContent = `${pct}%`
                scheduleConnectionsRender()
            }

            function setZoom(next) {
                zoom = clampZoom(next)
                applyZoom()
                safeStorageSet(ZOOM_STORAGE_KEY, String(zoom))
            }

            function getZoom() {
                return zoom || 1
            }

            function isToggleSelectionModifier(e) {
                return Boolean(e && (e.ctrlKey || e.metaKey))
            }

            function isAddSelectionModifier(e) {
                return Boolean(e && (e.shiftKey || e.ctrlKey || e.metaKey))
            }

            function setAlignMenuVisible(visible) {
                if (!alignMenuEl) return
                alignMenuEl.dataset.visible = visible ? "true" : "false"
            }

            function applySelectionToDom() {
                const root = itemsLayerEl || canvasEl
                if (!root) return
                root.querySelectorAll(".board-item.is-selected").forEach(
                    (n) => {
                        n.classList.remove("is-selected")
                    }
                )
                for (const key of selectedKeys) {
                    const el = root.querySelector(
                        `.board-item[data-key="${CSS.escape(String(key))}"]`
                    )
                    if (el) el.classList.add("is-selected")
                }
                setAlignMenuVisible(selectedKeys.size >= 2)
                scheduleSelectionOverlaysRender()
            }

            function renderSelectionOverlays() {
                if (!selectionOverlaysEl) return
                if (!itemsLayerEl) return
                if (!canvasEl) return
                const root = itemsLayerEl

                const canvasRect = canvasEl.getBoundingClientRect()

                const PAD = 10
                selectionOverlaysEl.replaceChildren()
                for (const key of selectedKeys) {
                    const k = String(key || "")
                    if (!k) continue
                    const el = root.querySelector(
                        `.board-item[data-key="${CSS.escape(k)}"]`
                    )
                    if (!el) continue

                    const overlay = document.createElement("div")
                    overlay.className = "wb-selection-overlay"
                    overlay.dataset.key = k

                    const r = el.getBoundingClientRect()
                    const rawW = r.width
                    const rawH = r.height
                    if (rawW <= 0 || rawH <= 0) {
                        continue
                    }

                    const x = Math.round(r.left - canvasRect.left - PAD)
                    const y = Math.round(r.top - canvasRect.top - PAD)
                    const w = Math.round(rawW + PAD * 2)
                    const h = Math.round(rawH + PAD * 2)
                    if (w <= 0 || h <= 0) continue

                    overlay.style.left = `0px`
                    overlay.style.top = `0px`
                    overlay.style.width = `${w}px`
                    overlay.style.height = `${h}px`
                    overlay.style.transform = `translate3d(${x}px, ${y}px, 0)`
                    selectionOverlaysEl.appendChild(overlay)
                }
            }

            function scheduleSelectionOverlaysRender() {
                if (!selectionOverlaysEl) return
                if (rafSelectionOverlayHandle) return
                rafSelectionOverlayHandle = globalThis.requestAnimationFrame(
                    () => {
                        rafSelectionOverlayHandle = 0
                        renderSelectionOverlays()
                    }
                )
            }

            function setSelectedKeys(next) {
                selectedKeys = new Set(next || [])
                applySelectionToDom()
                persistSelectionState()
            }

            function selectSingle(key) {
                const k = String(key || "")
                if (!k) return
                lastSelectedKey = k
                setSelectedKeys([k])
            }

            function toggleSelection(key) {
                const k = String(key || "")
                if (!k) return
                const next = new Set(selectedKeys)
                if (next.has(k)) next.delete(k)
                else next.add(k)
                lastSelectedKey = k
                setSelectedKeys(next)
            }

            function addToSelection(key) {
                const k = String(key || "")
                if (!k) return
                const next = new Set(selectedKeys)
                next.add(k)
                lastSelectedKey = k
                setSelectedKeys(next)
            }

            function clearSelection() {
                if (!selectedKeys.size) return
                setSelectedKeys([])
            }

            function boardRectToClientRect(x, y, w, h) {
                const canvasRect = canvasEl.getBoundingClientRect()
                return {
                    left: canvasRect.left + x,
                    top: canvasRect.top + y,
                    width: w,
                    height: h,
                }
            }

            function clientPointToBoard(e) {
                const canvasRect = canvasEl.getBoundingClientRect()
                const scale = getZoom()
                const x = (e.clientX - canvasRect.left) / scale
                const y = (e.clientY - canvasRect.top) / scale
                return { x, y }
            }

            function getItemBoundsInBoard(el) {
                const x = Number.parseFloat(el.style.left || "0") || 0
                const y = Number.parseFloat(el.style.top || "0") || 0
                const w = el.offsetWidth || 0
                const h = el.offsetHeight || 0
                return { x, y, w, h }
            }

            function rectsIntersect(a, b) {
                return !(
                    a.x + a.w < b.x ||
                    b.x + b.w < a.x ||
                    a.y + a.h < b.y ||
                    b.y + b.h < a.y
                )
            }

            function beginMarqueeSelection(e) {
                if (!selectionBoxEl || !canvasEl) return
                isMarqueeSelecting = true
                marqueeHasMoved = false
                marqueeStartClientX = e.clientX
                marqueeStartClientY = e.clientY
                selectionBoxEl.style.display = "none"
                selectionBoxEl.style.left = "0px"
                selectionBoxEl.style.top = "0px"
                selectionBoxEl.style.width = "0px"
                selectionBoxEl.style.height = "0px"
            }

            function updateMarqueeSelection(e) {
                if (!isMarqueeSelecting || !selectionBoxEl || !canvasEl) return
                const canvasRect = canvasEl.getBoundingClientRect()
                const x1 = marqueeStartClientX - canvasRect.left
                const y1 = marqueeStartClientY - canvasRect.top
                const x2 = e.clientX - canvasRect.left
                const y2 = e.clientY - canvasRect.top
                const left = Math.min(x1, x2)
                const top = Math.min(y1, y2)
                const width = Math.abs(x2 - x1)
                const height = Math.abs(y2 - y1)

                const SHOW_THRESHOLD_PX = 4
                if (!marqueeHasMoved) {
                    if (Math.max(width, height) < SHOW_THRESHOLD_PX) {
                        selectionBoxEl.style.display = "none"
                        return
                    }
                    marqueeHasMoved = true
                    selectionBoxEl.style.display = "block"
                }
                selectionBoxEl.style.left = `${left}px`
                selectionBoxEl.style.top = `${top}px`
                selectionBoxEl.style.width = `${width}px`
                selectionBoxEl.style.height = `${height}px`
            }

            function endMarqueeSelection(e, { additive }) {
                if (!isMarqueeSelecting || !selectionBoxEl || !canvasEl) return
                isMarqueeSelecting = false
                selectionBoxEl.style.display = "none"

                // Treat a click (no drag) as a no-op.
                if (!marqueeHasMoved) return

                const scale = getZoom()
                const canvasRect = canvasEl.getBoundingClientRect()
                const x1 = (marqueeStartClientX - canvasRect.left) / scale
                const y1 = (marqueeStartClientY - canvasRect.top) / scale
                const x2 = (e.clientX - canvasRect.left) / scale
                const y2 = (e.clientY - canvasRect.top) / scale
                const sel = {
                    x: Math.min(x1, x2),
                    y: Math.min(y1, y2),
                    w: Math.abs(x2 - x1),
                    h: Math.abs(y2 - y1),
                }

                const root = itemsLayerEl || canvasEl
                const hits = []
                root.querySelectorAll(".board-item").forEach((node) => {
                    const key = String(node.dataset.key || "")
                    if (!key) return
                    const b = getItemBoundsInBoard(node)
                    if (rectsIntersect(sel, b)) hits.push(key)
                })

                const next = additive ? new Set(selectedKeys) : new Set()
                hits.forEach((k) => next.add(k))
                setSelectedKeys(next)
            }

            function hideContextMenu() {
                if (!contextMenuEl) return
                contextMenuEl.style.display = "none"
                contextMenuKey = ""
            }

            function showContextMenuAt(x, y, key) {
                if (!contextMenuEl) return
                contextMenuKey = String(key || "")
                contextMenuEl.style.display = "block"

                // Clamp within viewport.
                const pad = 8
                const rect = contextMenuEl.getBoundingClientRect()
                const vw = globalThis.innerWidth || 0
                const vh = globalThis.innerHeight || 0
                const left = Math.max(pad, Math.min(x, vw - rect.width - pad))
                const top = Math.max(pad, Math.min(y, vh - rect.height - pad))
                contextMenuEl.style.left = `${left}px`
                contextMenuEl.style.top = `${top}px`
            }

            function ensureZOrder(state) {
                ensureWhiteboard(state)
                if (!Array.isArray(state.whiteboard.zOrder)) {
                    state.whiteboard.zOrder = []
                }
            }

            function zIndexForKey(state, key, fallbackIndex) {
                const zOrder = state?.whiteboard?.zOrder
                if (Array.isArray(zOrder)) {
                    const idx = zOrder.indexOf(String(key || ""))
                    if (idx >= 0) return 20 + idx
                }
                return 20 + (Number(fallbackIndex) || 0)
            }

            function getRenderedKeysInDomOrder() {
                const root = itemsLayerEl || canvasEl
                if (!root) return []
                const keys = []
                root.querySelectorAll(".board-item").forEach((node) => {
                    const key = String(node.dataset.key || "")
                    if (key) keys.push(key)
                })
                return keys
            }

            function applyZOrderAction(action, key) {
                const k = String(key || "")
                if (!k) return

                const domKeys = getRenderedKeysInDomOrder()
                const current = Array.isArray(sync.state?.whiteboard?.zOrder)
                    ? [...sync.state.whiteboard.zOrder]
                    : []

                // Ensure all currently rendered keys exist in zOrder.
                for (const dk of domKeys) {
                    if (!current.includes(dk)) current.push(dk)
                }
                if (!current.includes(k)) current.push(k)

                const idx = current.indexOf(k)
                if (idx < 0) return

                if (action === "bring-front") {
                    current.splice(idx, 1)
                    current.push(k)
                } else if (action === "send-back") {
                    current.splice(idx, 1)
                    current.unshift(k)
                } else if (action === "bring-forward") {
                    if (idx < current.length - 1) {
                        const tmp = current[idx + 1]
                        current[idx + 1] = current[idx]
                        current[idx] = tmp
                    }
                } else if (action === "send-backward") {
                    if (idx > 0) {
                        const tmp = current[idx - 1]
                        current[idx - 1] = current[idx]
                        current[idx] = tmp
                    }
                }

                sync.sendOp({ type: "wb.zorder.set", zOrder: current })
            }

            function deleteBoardKeys(keys) {
                const raw = Array.isArray(keys) ? keys : [keys]
                const unique = Array.from(
                    new Set(raw.map((k) => String(k || "")).filter(Boolean))
                )
                if (!unique.length) return

                // Clear local selection immediately (selection is not synced).
                if (selectedKeys.size) {
                    const next = new Set(selectedKeys)
                    let changed = false
                    for (const k of unique) {
                        if (next.has(k)) {
                            next.delete(k)
                            changed = true
                        }
                    }
                    if (changed) {
                        selectedKeys = next
                        applySelectionToDom()
                        persistSelectionState()
                    }
                }

                sync.sendOp({ type: "wb.items.delete", keys: unique })
            }

            // Restore zoom from localStorage (per participant).
            const savedZoom = Number.parseFloat(
                safeStorageGet(ZOOM_STORAGE_KEY) || ""
            )
            if (Number.isFinite(savedZoom)) {
                zoom = clampZoom(savedZoom)
            }

            let lastCaret = null
            let lastCaretAt = 0
            let lastTextInputAt = 0
            let lastPointerDownAt = 0

            // Per-textframe local activity markers to avoid disabling/blurring
            // the active textarea due to momentary lock-state churn.
            const localTextFrameActivity = new Map()

            function isTypingGracePeriod() {
                if (!lastCaret || !lastCaret.frameId) return false
                return Date.now() - lastTextInputAt < 900
            }

            function captureCaret(frameId, textarea) {
                if (!textarea) return
                try {
                    lastCaret = {
                        frameId: String(frameId || ""),
                        start: textarea.selectionStart,
                        end: textarea.selectionEnd,
                        direction: textarea.selectionDirection || "none",
                    }
                    lastCaretAt = Date.now()
                } catch {
                    // ignore
                }
            }

            function markTextInput(frameId, textarea) {
                lastTextInputAt = Date.now()
                const fid = String(frameId || "")
                if (fid) {
                    const prev = localTextFrameActivity.get(fid) || {}
                    localTextFrameActivity.set(fid, {
                        ...prev,
                        lastInputAt: lastTextInputAt,
                    })
                }
                captureCaret(frameId, textarea)
            }

            // Used to avoid refocusing when the user intentionally clicks elsewhere.
            document.addEventListener(
                "pointerdown",
                () => {
                    lastPointerDownAt = Date.now()
                },
                true
            )

            function restoreCaretIfRecent(frameId, textarea) {
                if (!textarea) return
                if (!lastCaret) return
                if (String(frameId || "") !== String(lastCaret.frameId || "")) {
                    return
                }
                if (Date.now() - lastCaretAt > 1500) return

                // Only restore if the user likely still types here.
                if (document.activeElement === textarea) return
                try {
                    textarea.focus({ preventScroll: true })
                    if (
                        Number.isFinite(lastCaret.start) &&
                        Number.isFinite(lastCaret.end)
                    ) {
                        textarea.setSelectionRange(
                            lastCaret.start,
                            lastCaret.end,
                            lastCaret.direction
                        )
                    }
                } catch {
                    // ignore
                }
            }

            function isTypingInTextFrame() {
                const el = document.activeElement
                if (!el) return false
                if (String(el.tagName || "").toUpperCase() !== "TEXTAREA") {
                    return false
                }
                return Boolean(
                    el.closest && el.closest(".board-item.board-text")
                )
            }

            function scheduleRender(state) {
                latestStateForRender = state
                if (rafRenderHandle) return
                rafRenderHandle = globalThis.requestAnimationFrame(() => {
                    rafRenderHandle = 0
                    if (isTypingInTextFrame() || isTypingGracePeriod()) {
                        pendingFullRenderAfterTyping = true
                        return
                    }
                    const s = latestStateForRender
                    latestStateForRender = null
                    render(s)
                })
            }

            // Zoom: scale only the board contents (items layer), not the UI.
            if (zoomOutBtn) {
                zoomOutBtn.addEventListener("click", () => {
                    setZoom(getZoom() / 1.1)
                })
            }
            if (zoomInBtn) {
                zoomInBtn.addEventListener("click", () => {
                    setZoom(getZoom() * 1.1)
                })
            }
            if (zoomResetBtn) {
                zoomResetBtn.addEventListener("click", () => {
                    setZoom(1)
                })
            }
            applyZoom()

            if (canvasEl) {
                canvasEl.addEventListener(
                    "wheel",
                    (e) => {
                        // Use Ctrl/trackpad pinch gesture to zoom the contents.
                        if (!e.ctrlKey) return
                        // Prevent browser/page zoom.
                        e.preventDefault()
                        const current = getZoom()
                        const factor = Math.exp(-e.deltaY * 0.001)
                        setZoom(current * factor)
                    },
                    { passive: false }
                )
            }

            // While typing, do lightweight renders only; on blur, catch up.
            if (canvasEl) {
                canvasEl.addEventListener("focusout", (e) => {
                    const tag = String(e.target?.tagName || "").toUpperCase()
                    if (tag !== "TEXTAREA") return
                    globalThis.setTimeout(() => {
                        if (isTypingInTextFrame()) return
                        if (!pendingFullRenderAfterTyping) return
                        pendingFullRenderAfterTyping = false
                        const s = latestStateForRender || sync.state
                        latestStateForRender = null
                        render(s)
                    }, 0)
                })
            }

            function ensureWhiteboard(state) {
                state.whiteboard = state.whiteboard || {}
                state.whiteboard.items = state.whiteboard.items || {}
            }

            function ensureHiddenThemes(state) {
                ensureWhiteboard(state)
                state.whiteboard.hiddenThemes =
                    state.whiteboard.hiddenThemes || {}
            }

            function ensureTextFrames(state) {
                ensureWhiteboard(state)
                state.whiteboard.textFrames = state.whiteboard.textFrames || {}
            }

            function ensurePosition(state, key) {
                ensureWhiteboard(state)
                if (!state.whiteboard.items[key]) {
                    state.whiteboard.items[key] = { x: 30, y: 30 }
                }
            }

            function ensurePositionAt(state, key, x, y) {
                ensureWhiteboard(state)
                if (!state.whiteboard.items[key]) {
                    state.whiteboard.items[key] = {
                        x: Number.isFinite(x) ? x : 30,
                        y: Number.isFinite(y) ? y : 30,
                    }
                }
            }

            function isThemeHidden(state, themeName) {
                return Boolean(state?.whiteboard?.hiddenThemes?.[themeName])
            }

            function isLockedByOther(state, id) {
                const lock = state?.whiteboard?.locks?.[String(id || "")]
                if (!lock) return false
                const by = String(lock.clientId || "")
                if (!by) return false
                return by !== String(clientId || "")
            }

            function toggleThemeHidden(themeName) {
                const t = String(themeName || "").trim()
                if (!t) return
                const nextHidden = !isThemeHidden(sync.state, t)
                sync.sendOp({
                    type: "wb.hidden.set",
                    theme: t,
                    hidden: nextHidden,
                })
            }

            function renameTheme(themeName) {
                const from = String(themeName || "").trim()
