                if (!from) return
                const next = globalThis.prompt(
                    "Neuer Name für das Thema:",
                    from
                )
                const to = String(next || "").trim()
                if (!to || to === from) return

                sync.sendOp({
                    type: "collections.theme.rename",
                    from,
                    to,
                })
            }

            function getThemeSelection(state, themeName) {
                const arr =
                    (state.collections && state.collections[themeName]) || []
                return Array.isArray(arr) ? arr : []
            }

            function allThemes(state) {
                const themes = state.collections
                    ? Object.keys(state.collections)
                    : []
                themes.sort((a, b) => a.localeCompare(b, "de"))
                return themes
            }

            function applySectionColors(el, sectionIndex) {
                if (!sectionIndex) return
                const rootStyle = getComputedStyle(document.documentElement)
                const bg = rootStyle.getPropertyValue(
                    `--section-${sectionIndex}`
                )
                const fg = rootStyle.getPropertyValue(
                    `--onSection-${sectionIndex}`
                )
                if (bg) el.style.backgroundColor = bg
                if (fg) el.style.color = fg
            }

            const SVG_NS = "http://www.w3.org/2000/svg"

            function ensureSvgChild(parent, tag, id) {
                if (!parent) return null
                const existing = parent.querySelector(
                    `#${CSS.escape(String(id || ""))}`
                )
                if (existing) return existing
                const node = document.createElementNS(SVG_NS, tag)
                node.setAttribute("id", id)
                parent.appendChild(node)
                return node
            }

            function ensureConnectionsStructure() {
                if (!connectionsEl) {
                    return {
                        linesRoot: null,
                        maskRectsRoot: null,
                        maskBg: null,
                    }
                }

                // Keep explicit sizing; otherwise SVG defaults (e.g. 300x150)
                // can clip lines to the bottom/right.
                connectionsEl.setAttribute(
                    "preserveAspectRatio",
                    "xMinYMin meet"
                )

                const defs = ensureSvgChild(
                    connectionsEl,
                    "defs",
                    "wb-connections-defs"
                )
                const mask = ensureSvgChild(defs, "mask", "wb-lines-mask")
                mask.setAttribute("maskUnits", "userSpaceOnUse")

                const maskBg = ensureSvgChild(mask, "rect", "wb-lines-mask-bg")
                maskBg.setAttribute("fill", "white")

                const maskRectsRoot = ensureSvgChild(
                    mask,
                    "g",
                    "wb-lines-mask-rects"
                )

                const linesRoot = ensureSvgChild(connectionsEl, "g", "wb-lines")
                linesRoot.setAttribute("mask", "url(#wb-lines-mask)")

                return { linesRoot, maskRectsRoot, maskBg }
            }

            function updateConnectionsViewport() {
                if (!connectionsEl) return { w: 0, h: 0 }
                const canvasRect = canvasEl
                    ? canvasEl.getBoundingClientRect()
                    : { width: 0, height: 0 }
                const w = Math.max(0, Number(canvasRect.width) || 0)
                const h = Math.max(0, Number(canvasRect.height) || 0)
                if (!(w > 0 && h > 0)) return { w: 0, h: 0 }

                connectionsEl.setAttribute("width", String(w))
                connectionsEl.setAttribute("height", String(h))
                connectionsEl.setAttribute("viewBox", `0 0 ${w} ${h}`)
                return { w, h }
            }

            function updateConnectionsMask(maskRectsRoot, maskBg, dims) {
                if (!itemsLayerEl || !maskRectsRoot || !maskBg) return

                const w = Number(dims?.w) || 0
                const h = Number(dims?.h) || 0
                maskBg.setAttribute("x", "0")
                maskBg.setAttribute("y", "0")
                maskBg.setAttribute("width", String(w))
                maskBg.setAttribute("height", String(h))

                const PAD = 6
                const existing = new Map()
                maskRectsRoot
                    .querySelectorAll("rect[data-key]")
                    .forEach((r) => {
                        const k = String(r.dataset.key || "")
                        if (k) existing.set(k, r)
                    })

                const desired = new Set()
                const canvasRect = canvasEl
                    ? canvasEl.getBoundingClientRect()
                    : null

                itemsLayerEl.querySelectorAll(".board-item").forEach((el) => {
                    const k = String(el.dataset.key || "")
                    if (!k) return
                    desired.add(k)

                    let rect = existing.get(k)
                    if (!rect) {
                        rect = document.createElementNS(SVG_NS, "rect")
                        rect.dataset.key = k
                        rect.setAttribute("fill", "black")
                        maskRectsRoot.appendChild(rect)
                        existing.set(k, rect)
                    }

                    const r = el.getBoundingClientRect()
                    const x =
                        (canvasRect ? r.left - canvasRect.left : r.left) - PAD
                    const y =
                        (canvasRect ? r.top - canvasRect.top : r.top) - PAD
                    const rw = (r.width || 0) + PAD * 2
                    const rh = (r.height || 0) + PAD * 2
                    rect.setAttribute("x", String(x))
                    rect.setAttribute("y", String(y))
                    rect.setAttribute("width", String(rw))
                    rect.setAttribute("height", String(rh))
                })

                for (const [k, rect] of existing.entries()) {
                    if (!desired.has(k)) rect.remove()
                }
            }

            function getItemCenterInCanvas(key, canvasRect) {
                if (!itemsLayerEl) return null
                const k = String(key || "")
                if (!k) return null
                const el = itemsLayerEl.querySelector(
                    `.board-item[data-key="${CSS.escape(k)}"]`
                )
                if (!el) return null

                const r = el.getBoundingClientRect()
                const base =
                    canvasRect || (canvasEl && canvasEl.getBoundingClientRect())
                const left = base ? r.left - base.left : r.left
                const top = base ? r.top - base.top : r.top
                const w = r.width || 0
                const h = r.height || 0
                return {
                    x: left + w / 2,
                    y: top + h / 2,
                }
            }

            function renderConnections(pairs) {
                if (!connectionsEl) return
                const list = Array.isArray(pairs) ? pairs : []

                const dims = updateConnectionsViewport()
                const canvasRect = canvasEl
                    ? canvasEl.getBoundingClientRect()
                    : null

                const { linesRoot, maskRectsRoot, maskBg } =
                    ensureConnectionsStructure()
                if (!linesRoot) return
                updateConnectionsMask(maskRectsRoot, maskBg, dims)

                const existing = new Map()
                linesRoot.querySelectorAll("line[data-key]").forEach((l) => {
                    const k = String(l.dataset.key || "")
                    if (k) existing.set(k, l)
                })

                const desired = new Set()
                for (const p of list) {
                    const from = String(p?.from || "")
                    const to = String(p?.to || "")
                    if (!from || !to) continue
                    const key = `${from}=>${to}`
                    desired.add(key)

                    const a = getItemCenterInCanvas(from, canvasRect)
                    const b = getItemCenterInCanvas(to, canvasRect)
                    if (!a || !b) continue

                    let line = existing.get(key)
                    if (!line) {
                        line = document.createElementNS(SVG_NS, "line")
                        line.dataset.key = key
                        linesRoot.appendChild(line)
                        existing.set(key, line)
                    }
                    line.setAttribute("x1", String(a.x))
                    line.setAttribute("y1", String(a.y))
                    line.setAttribute("x2", String(b.x))
                    line.setAttribute("y2", String(b.y))
                }

                for (const [k, line] of existing.entries()) {
                    if (!desired.has(k)) {
                        line.remove()
                    }
                }
            }

            function scheduleConnectionsRender() {
                if (!connectionsEl) return
                if (rafConnectionsHandle) return
                rafConnectionsHandle = globalThis.requestAnimationFrame(() => {
                    rafConnectionsHandle = 0
                    renderConnections(latestConnectionPairs)
                })
            }

            // Keep the SVG at least fullscreen when the window changes size.
            const onConnectionsResize = debounce(() => {
                updateConnectionsViewport()
                scheduleConnectionsRender()
            }, 50)
            globalThis.addEventListener("resize", onConnectionsResize)

            // Initial sizing (fullscreen/min canvas) on first load.
            updateConnectionsViewport()

            function collectExistingTextFrameNodes() {
                const existing = new Map()
                ;(itemsLayerEl || canvasEl)
                    .querySelectorAll(".board-item.board-text")
                    .forEach((el) => {
                        const key = String(el.dataset.key || "")
                        if (key) existing.set(key, el)
                    })
                return existing
            }

            function pruneDeletedTextFrames(existing, frames) {
                for (const [key, el] of existing.entries()) {
                    if (
                        isTypingGracePeriod() &&
                        lastCaret &&
                        String(key) === String(lastCaret.frameId)
                    ) {
                        continue
                    }
                    if (!Object.hasOwn(frames, key)) {
                        el.remove()
                    }
                }
            }

            function autoGrowTextarea(textarea) {
                if (!textarea) return
                const prevHeight = textarea.style.height
                try {
                    const cs = getComputedStyle(textarea)
                    const fontSize = Number.parseFloat(cs.fontSize || "")
                    const rawLineHeight = cs.lineHeight
                    let lineHeight = 16 * 1.2
                    if (rawLineHeight && rawLineHeight !== "normal") {
                        lineHeight = Number.parseFloat(rawLineHeight)
                    } else if (Number.isFinite(fontSize)) {
                        lineHeight = fontSize * 1.2
                    }

                    const padTop = Number.parseFloat(cs.paddingTop || "") || 0
                    const padBottom =
                        Number.parseFloat(cs.paddingBottom || "") || 0
                    const borderTop =
                        Number.parseFloat(cs.borderTopWidth || "") || 0
                    const borderBottom =
                        Number.parseFloat(cs.borderBottomWidth || "") || 0

                    const MIN_ROWS = 5
                    const minHeight =
                        lineHeight * MIN_ROWS +
                        padTop +
                        padBottom +
                        borderTop +
                        borderBottom

                    // Measure needed height.
                    textarea.style.height = "auto"
                    const needed =
                        (Number(textarea.scrollHeight) || 0) +
                        borderTop +
                        borderBottom

                    const target = Math.max(minHeight, needed)
                    textarea.style.height = `${Math.ceil(target)}px`
                } catch {
                    try {
                        textarea.style.height = prevHeight
                    } catch {
                        // ignore
                    }
                }
            }

            function installTextFrameTextareaBehavior(id, textarea) {
                let unlockTimeout = 0
                let didAcquireLock = false

                const ensureLocalLock = () => {
                    if (!textarea || textarea.disabled) return
                    if (didAcquireLock) return
                    // If a remote lock already exists, don't let the user edit.
                    if (isLockedByOther(sync.state, id)) return
                    didAcquireLock = true
                    const fid = String(id || "")
                    if (fid) {
                        const prev = localTextFrameActivity.get(fid) || {}
                        localTextFrameActivity.set(fid, {
                            ...prev,
                            didAcquireLock: true,
                            lockAcquiredAt: Date.now(),
                        })
                    }
                    sync.sendOp({ type: "wb.lock", id, locked: true })
                }

                const persistText = debounce((value) => {
                    if (!textarea || textarea.disabled) return
                    sync.sendOp({
                        type: "wb.text.set",
                        id,
                        text: String(value || ""),
                    })
                }, 250)

                const rememberCaret = () => {
                    captureCaret(id, textarea)
                }

                // Lock only once the user actually starts editing.
                textarea.addEventListener("beforeinput", () => {
                    ensureLocalLock()
                })

                textarea.addEventListener("compositionstart", () => {
                    ensureLocalLock()
                })

                textarea.addEventListener("paste", () => {
                    ensureLocalLock()
                })

                textarea.addEventListener("input", () => {
                    if (textarea.disabled) return
                    ensureLocalLock()
                    markTextInput(id, textarea)
                    autoGrowTextarea(textarea)
                    persistText(textarea.value)
                })
                textarea.addEventListener("keyup", rememberCaret)
                textarea.addEventListener("mouseup", rememberCaret)
                textarea.addEventListener("select", rememberCaret)
                textarea.addEventListener("compositionend", () =>
                    markTextInput(id, textarea)
                )

                textarea.addEventListener("focus", () => {
                    if (unlockTimeout) {
                        globalThis.clearTimeout(unlockTimeout)
                        unlockTimeout = 0
                    }
                    // No lock-on-focus: keep clicking into the textarea interruption-free.
                })

                textarea.addEventListener("blur", () => {
                    if (unlockTimeout) globalThis.clearTimeout(unlockTimeout)
                    unlockTimeout = globalThis.setTimeout(() => {
                        unlockTimeout = 0
                        if (document.activeElement === textarea) return
                        if (didAcquireLock) {
                            didAcquireLock = false
                            const fid = String(id || "")
                            if (fid) {
                                const prev =
                                    localTextFrameActivity.get(fid) || {}
                                localTextFrameActivity.set(fid, {
                                    ...prev,
                                    didAcquireLock: false,
                                    lockReleasedAt: Date.now(),
                                })
                            }
                            sync.sendOp({ type: "wb.lock", id, locked: false })
                        }
                    }, 350)
                })

                textarea.addEventListener("blur", () => {
                    const snapshotAt = lastTextInputAt
                    globalThis.setTimeout(() => {
                        // If the user clicked elsewhere intentionally, don't steal focus back.
                        if (isTypingInTextFrame()) return
                        if (Date.now() - snapshotAt > 400) return
                        if (Date.now() - lastPointerDownAt < 250) return
                        const active = document.activeElement
                        if (
                            active &&
                            active !== document.body &&
                            active !== document.documentElement
                        ) {
                            return
                        }
                        restoreCaretIfRecent(id, textarea)
                    }, 0)
                })
            }

            function createTextFrameNode(id) {
                const item = document.createElement("div")
                item.className = "board-item board-text"
                item.dataset.key = id

                const frameEl = document.createElement("div")
                frameEl.className = "wb-text-frame"

                const textarea = document.createElement("textarea")
                textarea.setAttribute("aria-label", "Textfeld")
                frameEl.appendChild(textarea)
                item.appendChild(frameEl)

                installTextFrameTextareaBehavior(id, textarea)
                autoGrowTextarea(textarea)

                makeDraggable(item, (x, y) => {
                    sync.sendOp({ type: "wb.item.move", key: id, x, y })
                })
                ;(itemsLayerEl || canvasEl).appendChild(item)
                return item
            }

            function updateTextFrameNode(item, id, frame, state) {
                const pos = (state.whiteboard &&
                    state.whiteboard.items &&
                    state.whiteboard.items[id]) || { x: 220, y: 60 }

                item.style.left = `${Math.max(0, pos.x)}px`
                item.style.top = `${Math.max(0, pos.y)}px`
                item.style.zIndex = String(zIndexForKey(state, id, 5000))

                const textarea = item.querySelector("textarea")
                if (!textarea) return

                const isActive = document.activeElement === textarea
                const lockedByOther = isLockedByOther(state, id)

                // Never disable/blur the active textarea while the user is typing.
                // This prevents "full reload"-like interruptions caused by transient lock-state churn.
                const fid = String(id || "")
                const activity = fid ? localTextFrameActivity.get(fid) : null
                const recentlyTypedHere = Boolean(
                    (isTypingGracePeriod() &&
                        lastCaret &&
                        String(lastCaret.frameId || "") === fid) ||
                    (activity &&
                        Number.isFinite(activity.lastInputAt) &&
                        Date.now() - activity.lastInputAt < 1500)
                )
                const recentlyAcquiredLocalLock = Boolean(
                    activity &&
                    activity.didAcquireLock &&
                    Number.isFinite(activity.lockAcquiredAt) &&
                    Date.now() - activity.lockAcquiredAt < 2500
                )
                const deferLockEnforcement =
                    lockedByOther &&
                    isActive &&
                    (recentlyTypedHere || recentlyAcquiredLocalLock)

                const effectiveLockedByOther =
                    lockedByOther && !deferLockEnforcement
                item.classList.toggle("is-locked", effectiveLockedByOther)
                if (!isActive) {
                    textarea.disabled = effectiveLockedByOther
                } else if (effectiveLockedByOther) {
                    // Active but locked: keep enabled to avoid blur; user can finish the current keystroke.
                    textarea.disabled = false
                } else {
                    textarea.disabled = false
                }

                const nextText = String(frame?.text || "")
                if (
                    !effectiveLockedByOther &&
                    document.activeElement !== textarea
                ) {
                    textarea.value = nextText
                    autoGrowTextarea(textarea)
                }
                if (!effectiveLockedByOther) restoreCaretIfRecent(id, textarea)
            }

            function renderTextFrames(state) {
                const frames =
                    (state.whiteboard && state.whiteboard.textFrames) || {}
                const existing = collectExistingTextFrameNodes()
                pruneDeletedTextFrames(existing, frames)

                let fallbackZ = 5000
                for (const [id, frame] of Object.entries(frames)) {
                    let item = existing.get(id)
                    if (!item) {
                        item = createTextFrameNode(id)
                    }
                    item.style.zIndex = String(
                        zIndexForKey(state, id, fallbackZ++)
                    )
                    updateTextFrameNode(item, id, frame, state)
                }
            }

            function render(state) {
                // Only treat an actually focused textarea as "typing" here.
                // The grace period is handled in scheduleRender to prevent focus/caret churn.
                const typing = isTypingInTextFrame()
                const themes = allThemes(state)
                boardTitleEl.textContent = "Alle Themen"
                themesEl.textContent = themes.length
                    ? `Themen: ${themes.join(" · ")}`
                    : "Themen: –"

                renderTextFrames(state)

                if (typing) {
                    // Keep typing smooth: don't rebuild the full board while a text frame is focused.
                    pendingFullRenderAfterTyping = true
                    return
                }

                const itemsRoot = itemsLayerEl || canvasEl
                const existingNonText = new Map()
                itemsRoot
                    .querySelectorAll(".board-item:not(.board-text)")
                    .forEach((el) => {
                        const key = String(el.dataset.key || "")
                        if (key) existingNonText.set(key, el)
                    })

                const desiredKeys = new Set()
                const connectionPairs = []

                if (!criteriaById.size) {
                    boardTitleEl.textContent = "Lade Prüfschritte …"
                    latestConnectionPairs = []
                    renderConnections([])
                    return
                }

                let fallbackZ = 0

                const ensureThemeHeaderNode = (tName) => {
                    const headerKey = `themeHeader::${tName}`
                    let item = existingNonText.get(headerKey)
                    if (item) return item

                    item = document.createElement("div")
                    item.className = "board-item board-theme"
                    item.dataset.key = headerKey

                    const card = document.createElement("div")
                    card.className = "card section-card wb-theme-card"

                    const titleEl = document.createElement("div")
                    titleEl.className = "wb-theme-card-title"
                    titleEl.textContent = tName
                    card.appendChild(titleEl)

                    const renameBtn = document.createElement("button")
                    renameBtn.type = "button"
                    renameBtn.className = "v4-btn wb-theme-rename"
                    renameBtn.dataset.role = "theme-rename"
                    renameBtn.setAttribute("aria-label", "Thema umbenennen")
                    renameBtn.setAttribute("title", "Thema umbenennen")

                    const renameIcon = document.createElement("span")
                    renameIcon.className = "material-icons"
                    renameIcon.setAttribute("aria-hidden", "true")
                    renameIcon.textContent = "edit"
                    renameBtn.appendChild(renameIcon)

                    renameBtn.addEventListener("click", (e) => {
                        e.preventDefault()
                        e.stopPropagation()
                        renameTheme(tName)
                    })
                    card.appendChild(renameBtn)

                    const toggleBtn = document.createElement("button")
                    toggleBtn.type = "button"
                    toggleBtn.className = "v4-btn wb-theme-toggle"
                    toggleBtn.dataset.role = "theme-toggle"

                    const iconEl = document.createElement("span")
                    iconEl.className = "material-icons"
                    iconEl.setAttribute("aria-hidden", "true")
                    iconEl.textContent = "visibility"
                    toggleBtn.appendChild(iconEl)

                    toggleBtn.addEventListener("click", (e) => {
                        e.preventDefault()
                        e.stopPropagation()
                        toggleThemeHidden(tName)
                    })
                    card.appendChild(toggleBtn)

                    const hintEl = document.createElement("div")
                    hintEl.className = "wcag-id"
                    hintEl.dataset.role = "theme-hint"
                    card.appendChild(hintEl)

                    item.appendChild(card)

                    const shiftGroup = {
                        active: false,
                        startDx: 0,
                        startDy: 0,
                        members: [],
                    }

                    const initShiftGroupIfNeeded = (dx, dy) => {
                        if (shiftGroup.active) return

                        const byKey = new Map()
                        itemsRoot
                            .querySelectorAll(".board-item")
                            .forEach((node) => {
                                const k = String(node?.dataset?.key || "")
                                if (k) byKey.set(k, node)
                            })

                        const memberKeys = (latestConnectionPairs || [])
                            .filter((p) => p && p.from === headerKey)
                            .map((p) => p.to)

                        const members = []
                        for (const key of memberKeys) {
                            const el = byKey.get(String(key))
                            if (!el) continue
                            const left = Number.parseFloat(el.style.left || "0")
                            const top = Number.parseFloat(el.style.top || "0")
                            members.push({
                                key,
                                el,
                                originLeft: left,
                                originTop: top,
                            })
                        }

                        shiftGroup.active = true
                        shiftGroup.startDx = dx
                        shiftGroup.startDy = dy
                        shiftGroup.members = members
                    }

                    const applyShiftGroupMove = (dx, dy) => {
                        if (!shiftGroup.active) return
                        const gdx = dx - shiftGroup.startDx
                        const gdy = dy - shiftGroup.startDy
                        for (const m of shiftGroup.members) {
                            const x = Math.max(0, m.originLeft + gdx)
                            const y = Math.max(0, m.originTop + gdy)
                            m.el.style.left = `${x}px`
                            m.el.style.top = `${y}px`
                        }
                    }

                    makeDraggable(
                        item,
                        (x, y) => {
                            sync.sendOp({
                                type: "wb.item.move",
                                key: headerKey,
                                x,
                                y,
                            })
                        },
                        {
                            onDragStart: ({ event }) => {
                                if (!event?.shiftKey) return
                                initShiftGroupIfNeeded(0, 0)
                            },
                            onMoveWhileDragging: ({ event, dx, dy }) => {
                                if (!event?.shiftKey) return
                                initShiftGroupIfNeeded(dx, dy)
                                applyShiftGroupMove(dx, dy)
                            },
                            onDrop: () => {
                                if (!shiftGroup.active) return
                                for (const m of shiftGroup.members) {
                                    const x = Number.parseFloat(
                                        m.el.style.left || "0"
                                    )
                                    const y = Number.parseFloat(
                                        m.el.style.top || "0"
                                    )
                                    sync.sendOp({
                                        type: "wb.item.move",
                                        key: m.key,
                                        x: Math.round(x),
                                        y: Math.round(y),
                                    })
                                }
                                shiftGroup.active = false
                                shiftGroup.members = []
                            },
                        }
                    )

                    itemsRoot.appendChild(item)
                    existingNonText.set(headerKey, item)
                    return item
                }

                const ensureCriteriaCardNode = (tName, criteriaId, meta) => {
                    const key = `${tName}::${criteriaId}`
                    let item = existingNonText.get(key)
                    if (item) return item

                    item = document.createElement("div")
                    item.className = "board-item"
                    item.dataset.key = key

                    const card = document.createElement("div")
                    card.className = "card pruefschritt-card"
                    applySectionColors(card, meta.sectionIndex)

                    const themeLabel = document.createElement("div")
                    themeLabel.className = "wcag-id"
                    themeLabel.textContent = tName
                    card.appendChild(themeLabel)

                    const infoBtn = document.createElement("button")
                    infoBtn.type = "button"
                    infoBtn.className = "wb-info-btn"
                    infoBtn.setAttribute("aria-label", "Details anzeigen")
                    const infoTitleParts = []
                    if (meta?.wcagId) infoTitleParts.push(`WCAG ${meta.wcagId}`)
                    if (meta?.bitvId) infoTitleParts.push(`BITV ${meta.bitvId}`)
                    infoBtn.title = infoTitleParts.length
                        ? `Details anzeigen (${infoTitleParts.join(", ")})`
                        : "Details anzeigen"

                    const infoIcon = document.createElement("span")
                    infoIcon.className = "material-icons-outlined"
                    infoIcon.setAttribute("aria-hidden", "true")
                    infoIcon.textContent = "info"
                    infoBtn.appendChild(infoIcon)

                    const suppressDragStart = (e) => {
                        e.stopPropagation()
                    }
                    infoBtn.addEventListener("pointerdown", suppressDragStart)
                    infoBtn.addEventListener("mousedown", suppressDragStart)
                    infoBtn.addEventListener("touchstart", suppressDragStart, {
                        passive: true,
                    })

                    infoBtn.addEventListener("click", (e) => {
                        e.preventDefault()
                        e.stopPropagation()
                        void openDetailsByCriteriaId(meta?.id || criteriaId)
                    })
                    card.appendChild(infoBtn)

                    if (meta.wcagId) {
                        const wcagIdEl = document.createElement("div")
                        wcagIdEl.className = "wcag-id"
                        wcagIdEl.textContent = `WCAG ${meta.wcagId}`
                        card.appendChild(wcagIdEl)
                    }

                    if (meta.bitvId) {
                        const bitvIdEl = document.createElement("div")
                        bitvIdEl.className = "bitv-id"
                        bitvIdEl.textContent = `BITV ${meta.bitvId}`
                        card.appendChild(bitvIdEl)
                        card.classList.add("is-bitv")
                    }

                    const titleEl = document.createElement("div")
                    titleEl.className = "pruefschritt-title"
                    titleEl.textContent = meta.title
                    card.appendChild(titleEl)

                    if (meta.conformanceLevel) {
                        const levelEl = document.createElement("div")
                        levelEl.className = meta.conformanceLevel
                        levelEl.textContent = meta.conformanceLevel
                        card.appendChild(levelEl)
                    }

                    item.appendChild(card)

                    makeDraggable(item, (x, y) => {
                        sync.sendOp({ type: "wb.item.move", key, x, y })
                    })

                    itemsRoot.appendChild(item)
                    existingNonText.set(key, item)
                    return item
                }

                const updatePosition = (item, pos) => {
                    const x = Math.max(0, Number(pos?.x) || 0)
                    const y = Math.max(0, Number(pos?.y) || 0)
                    item.style.left = `${x}px`
                    item.style.top = `${y}px`
                }

                const updateThemeHeader = (item, tName, tSelection, index) => {
                    const headerKey = `themeHeader::${tName}`
                    const storedPos =
                        state.whiteboard &&
                        state.whiteboard.items &&
                        state.whiteboard.items[headerKey]
                    const fallbackPos = {
                        x: 12,
                        y: 60 + Math.max(0, Number(index) || 0) * 140,
                    }
                    updatePosition(item, storedPos || fallbackPos)
                    item.style.zIndex = String(
                        zIndexForKey(state, headerKey, fallbackZ++)
                    )

                    const hidden = isThemeHidden(state, tName)
                    const toggleBtn = item.querySelector(
                        'button[data-role="theme-toggle"]'
                    )
                    if (toggleBtn) {
                        const label = hidden
                            ? "Thema einblenden"
                            : "Thema ausblenden"
                        toggleBtn.setAttribute("aria-label", label)
                        toggleBtn.setAttribute("title", label)

                        const icon = toggleBtn.querySelector(".material-icons")
                        if (icon) {
                            icon.textContent = hidden
                                ? "visibility_off"
                                : "visibility"
                        }
                    }
                    const hintEl = item.querySelector(
                        'div[data-role="theme-hint"]'
                    )
                    if (hintEl) {
                        hintEl.textContent = hidden
                            ? `Karten: ${tSelection.length} (aus)`
                            : `Karten: ${tSelection.length}`
                    }
                }

                const updateCriteriaCard = (item, key, hidden) => {
                    const pos = (state.whiteboard &&
                        state.whiteboard.items &&
                        state.whiteboard.items[key]) || { x: 30, y: 30 }
                    updatePosition(item, pos)
                    item.style.zIndex = String(
                        zIndexForKey(state, key, fallbackZ++)
                    )
                    item.style.display = hidden ? "none" : "block"
                }

                for (const [i, t] of themes.entries()) {
                    const selection = getThemeSelection(state, t)
                    const headerKey = `themeHeader::${t}`
                    desiredKeys.add(headerKey)
                    const headerNode = ensureThemeHeaderNode(t)
                    updateThemeHeader(headerNode, t, selection, i)

                    const hidden = isThemeHidden(state, t)

                    for (const criteriaId of selection) {
                        const meta = criteriaById.get(criteriaId) || {
                            id: criteriaId,
                            title: criteriaId,
                            sectionIndex: 0,
                            wcagId: "",
                            bitvId: "",
                            conformanceLevel: "",
                        }
                        const key = `${t}::${criteriaId}`
                        desiredKeys.add(key)
                        const node = ensureCriteriaCardNode(t, criteriaId, meta)
                        updateCriteriaCard(node, key, hidden)
                        if (!hidden) {
                            connectionPairs.push({ from: headerKey, to: key })
                        }
                    }
                }

                // Remove stale nodes that are no longer part of the current state.
                for (const [key, el] of existingNonText.entries()) {
                    if (!desiredKeys.has(key)) {
                        el.remove()
                        existingNonText.delete(key)
                    }
                }

                // Lines: theme title <-> card connections (behind items).
                latestConnectionPairs = connectionPairs
                renderConnections(connectionPairs)

                // Re-apply local selection after content updates.
                applySelectionToDom()
            }

            function makeDraggable(el, onMove, opts = {}) {
                if (el && el.dataset && el.dataset.draggableAttached === "1") {
                    return
                }
                if (el && el.dataset) {
                    el.dataset.draggableAttached = "1"
                }

                const onMoveWhileDragging =
                    typeof opts?.onMoveWhileDragging === "function"
                        ? opts.onMoveWhileDragging
                        : null
                const onDragStart =
                    typeof opts?.onDragStart === "function"
                        ? opts.onDragStart
                        : null
                const onDrop =
                    typeof opts?.onDrop === "function" ? opts.onDrop : null

                let dragging = false
                let pendingDrag = false
                let pendingPointerId = -1
                let pendingFromTextarea = false
                let startX = 0
                let startY = 0
                let originLeft = 0
                let originTop = 0

                const DRAG_THRESHOLD_PX = 6

                const startDrag = (e) => {
                    dragging = true
                    pendingDrag = false
                    pendingPointerId = -1
                    el.classList.add("dragging")
                    try {
                        el.setPointerCapture(e.pointerId)
                    } catch {
                        // ignore
                    }

                    if (onDragStart) {
                        try {
                            onDragStart({
                                event: e,
                                originLeft,
                                originTop,
                            })
                        } catch {
                            // ignore
                        }
                    }
                }

                const canPromotePendingDrag = (e) => {
                    if (!pendingDrag) return false
                    if (e.pointerId !== pendingPointerId) return false
                    const dx0 = e.clientX - startX
                    const dy0 = e.clientY - startY
                    return Math.hypot(dx0, dy0) >= DRAG_THRESHOLD_PX
                }

                const stopEditingIfNeeded = () => {
                    if (!pendingFromTextarea) return
                    const ta = el.querySelector("textarea")
                    if (ta && document.activeElement === ta) {
                        try {
                            ta.blur()
                        } catch {
                            // ignore
                        }
                    }
                }

                const promotePendingToDrag = (e) => {
                    pendingDrag = false
                    pendingPointerId = -1
                    stopEditingIfNeeded()
                    pendingFromTextarea = false
                    e.preventDefault()
                    startDrag(e)
                }

                const onPointerDown = (e) => {
                    if (el.classList && el.classList.contains("is-locked")) {
                        return
                    }

                    const card = el.querySelector(".card")
                    const textFrame = el.querySelector(".wb-text-frame")
                    if (!card && !textFrame) return

                    const interactive =
                        e.target &&
                        e.target.closest &&
                        e.target.closest(
                            "button, a, input, textarea, select, option, label"
                        )

                    const textareaTarget =
                        e.target && e.target.closest
                            ? e.target.closest("textarea")
                            : null
                    const allowTextareaDrag =
                        textareaTarget && el.classList.contains("board-text")

                    // For normal interactive elements, don't start dragging.
                    // For text frames, allow "full-surface" dragging from the textarea
                    // but only after a small movement threshold so clicks still edit.
                    if (interactive && !allowTextareaDrag) return

                    pendingFromTextarea = Boolean(allowTextareaDrag)

                    startX = e.clientX
                    startY = e.clientY
                    originLeft = Number.parseFloat(el.style.left || "0")
                    originTop = Number.parseFloat(el.style.top || "0")

                    if (pendingFromTextarea) {
                        pendingDrag = true
                        pendingPointerId = e.pointerId
                        return
                    }

                    startDrag(e)
                }

                const onPointerMove = (e) => {
                    if (!dragging) {
                        if (!canPromotePendingDrag(e)) return
                        promotePendingToDrag(e)
                    }

                    const scale = getZoom()
                    const dx = (e.clientX - startX) / scale
                    const dy = (e.clientY - startY) / scale
                    const x = Math.max(0, originLeft + dx)
                    const y = Math.max(0, originTop + dy)
                    el.style.left = `${x}px`
                    el.style.top = `${y}px`

                    if (onMoveWhileDragging) {
                        try {
                            onMoveWhileDragging({
                                event: e,
                                dx,
                                dy,
                                x,
                                y,
                                originLeft,
                                originTop,
                            })
                        } catch {
                            // ignore
                        }
                    }

                    scheduleConnectionsRender()
                    scheduleSelectionOverlaysRender()
                }

                const onPointerUp = (e) => {
                    if (pendingDrag && e.pointerId === pendingPointerId) {
                        pendingDrag = false
                        pendingPointerId = -1
                        pendingFromTextarea = false
                        return
                    }
                    if (!dragging) return
                    dragging = false
                    el.classList.remove("dragging")
                    lastDragEndedAt = Date.now()
                    try {
                        el.releasePointerCapture(e.pointerId)
                    } catch {
                        // ignore
                    }

                    const x = Number.parseFloat(el.style.left || "0")
                    const y = Number.parseFloat(el.style.top || "0")
                    onMove(Math.round(x), Math.round(y))

                    if (onDrop) {
                        try {
                            onDrop({
                                event: e,
                                x: Math.round(x),
                                y: Math.round(y),
                            })
                        } catch {
                            // ignore
                        }
                    }

                    scheduleConnectionsRender()
                    scheduleSelectionOverlaysRender()
                }

                el.addEventListener("pointerdown", onPointerDown)
                el.addEventListener("pointermove", onPointerMove)
                el.addEventListener("pointerup", onPointerUp)
                el.addEventListener("pointercancel", onPointerUp)
            }

            // Selection: click to select; Shift/Ctrl/Cmd for multi-select.
            function isPrimaryBoardClick(e) {
                if (!e) return false
                if (Date.now() - lastDragEndedAt < 250) return false
                if (e.button && e.button !== 0) return false
                return true
            }

            function isInteractiveBoardTarget(target) {
                return Boolean(
                    target &&
                    target.closest &&
                    target.closest(
                        "button, a, input, textarea, select, option, label"
                    )
                )
            }

            function keyFromBoardTarget(target) {
                const item =
                    target && target.closest
                        ? target.closest(".board-item")
                        : null
                return item ? String(item.dataset.key || "") : ""
            }

            function clearSelectionFromBoardClick(e) {
                if (selectionBoxEl) selectionBoxEl.style.display = "none"
                hideContextMenu()
                if (!isAddSelectionModifier(e)) clearSelection()
            }

            if (itemsLayerEl) {
                itemsLayerEl.addEventListener("click", (e) => {
                    if (!isPrimaryBoardClick(e)) return
                    const target = e.target
                    if (isInteractiveBoardTarget(target)) return

                    const key = keyFromBoardTarget(target)
                    if (!key) return clearSelectionFromBoardClick(e)

                    if (isToggleSelectionModifier(e)) {
                        toggleSelection(key)
                    } else if (e.shiftKey) {
                        addToSelection(key)
                    } else {
                        selectSingle(key)
                    }
                })

                // Context menu for z-order operations.
                itemsLayerEl.addEventListener("contextmenu", (e) => {
                    const item =
                        e.target && e.target.closest
                            ? e.target.closest(".board-item")
                            : null
                    const key = item ? String(item.dataset.key || "") : ""
                    if (!key) return
                    e.preventDefault()

                    // If the user right-clicks a non-selected item,
                    // treat it as the context target.
                    if (!selectedKeys.has(key)) {
                        selectSingle(key)
                    }

                    showContextMenuAt(e.clientX, e.clientY, key)
                })
            }

            // Marquee selection on empty canvas area.
            if (canvasEl) {
                canvasEl.addEventListener("pointerdown", (e) => {
                    if (e.button !== 0) return
                    const inUi =
                        e.target &&
                        e.target.closest &&
                        e.target.closest(
                            "#wb-toolbar, #wb-centerbar, #v4-connbar"
                        )
                    if (inUi) return

                    const onItem =
                        e.target &&
                        e.target.closest &&
                        e.target.closest(".board-item")
                    if (onItem) return

                    // Require a modifier so normal clicks don't surprise.
                    if (!isAddSelectionModifier(e)) return

                    hideContextMenu()
                    beginMarqueeSelection(e)
                })

                canvasEl.addEventListener("pointermove", (e) => {
                    updateMarqueeSelection(e)
                })

                canvasEl.addEventListener("pointerup", (e) => {
                    if (!isMarqueeSelecting) return
                    endMarqueeSelection(e, {
                        additive: isAddSelectionModifier(e),
                    })
                })

                canvasEl.addEventListener("pointercancel", (e) => {
                    if (!isMarqueeSelecting) return
                    isMarqueeSelecting = false
                    if (selectionBoxEl) selectionBoxEl.style.display = "none"
                })
            }

            // Hide context menu on outside click / Escape.
            document.addEventListener("click", (e) => {
                if (!contextMenuEl) return
                if (contextMenuEl.style.display !== "block") return
                const inside =
                    e.target && e.target.closest
                        ? e.target.closest("#wb-contextmenu")
                        : null
                if (!inside) hideContextMenu()
            })

            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") {
                    hideContextMenu()
                    if (isMarqueeSelecting) {
                        isMarqueeSelecting = false
                        if (selectionBoxEl)
                            selectionBoxEl.style.display = "none"
                    }
                    // Optional: clear selection with Escape if no context menu.
                    if (!isTypingInTextFrame()) clearSelection()
                }
            })

            if (contextMenuEl) {
                contextMenuEl.addEventListener("click", (e) => {
                    const btn =
                        e.target && e.target.closest
                            ? e.target.closest("button[data-action]")
                            : null
                    if (!btn) return
                    const action = String(btn.dataset.action || "")
                    if (!action || !contextMenuKey) return

                    if (action === "delete") {
                        const keys = selectedKeys.size
                            ? Array.from(selectedKeys)
                            : [contextMenuKey]
                        deleteBoardKeys(keys)
                    } else {
                        applyZOrderAction(action, contextMenuKey)
                    }
                    hideContextMenu()
                })
            }

            function getSelectedItemsForLayout() {
                const keys = Array.from(selectedKeys)
                if (keys.length < 2) return []
                const root = itemsLayerEl || canvasEl
                return keys
                    .map((k) => {
                        const el = root.querySelector(
                            `.board-item[data-key="${CSS.escape(String(k))}"]`
                        )
                        if (!el) return null
                        const b = getItemBoundsInBoard(el)
                        return { key: String(k), ...b }
                    })
                    .filter(Boolean)
            }

            function computeGroupMetrics(items) {
                const minX = Math.min(...items.map((i) => i.x))
                const minY = Math.min(...items.map((i) => i.y))
                const maxR = Math.max(...items.map((i) => i.x + i.w))
                const maxB = Math.max(...items.map((i) => i.y + i.h))
                return {
                    minX,
                    minY,
                    maxR,
                    maxB,
                    centerX: (minX + maxR) / 2,
                    centerY: (minY + maxB) / 2,
                }
            }

            function distributeAlong(items, axis) {
                const sorted = [...items].sort((a, b) =>
                    axis === "x" ? a.x - b.x : a.y - b.y
                )
                if (sorted.length <= 2) return new Map()

                const first = sorted[0]
                const last = sorted[sorted.length - 1]
                const span = axis === "x" ? last.x - first.x : last.y - first.y
                if (span <= 0) return new Map()

                const step = span / (sorted.length - 1)
                const updates = new Map()
                sorted.forEach((i, idx) => {
                    updates.set(i.key, {
                        x: axis === "x" ? first.x + step * idx : i.x,
                        y: axis === "y" ? first.y + step * idx : i.y,
                    })
                })
                return updates
            }

            function computeAlignmentUpdates(mode, items, metrics) {
                const updates = new Map()
                if (mode === "top") {
                    items.forEach((i) =>
                        updates.set(i.key, { x: i.x, y: metrics.minY })
                    )
                    return updates
                }
                if (mode === "middle-y") {
                    items.forEach((i) =>
                        updates.set(i.key, {
                            x: i.x,
                            y: metrics.centerY - i.h / 2,
                        })
                    )
                    return updates
                }
                if (mode === "bottom") {
                    items.forEach((i) =>
                        updates.set(i.key, { x: i.x, y: metrics.maxB - i.h })
                    )
                    return updates
                }
                if (mode === "left") {
                    items.forEach((i) =>
                        updates.set(i.key, { x: metrics.minX, y: i.y })
                    )
                    return updates
                }
                if (mode === "middle-x") {
                    items.forEach((i) =>
                        updates.set(i.key, {
                            x: metrics.centerX - i.w / 2,
                            y: i.y,
                        })
                    )
                    return updates
                }
                if (mode === "right") {
                    items.forEach((i) =>
                        updates.set(i.key, { x: metrics.maxR - i.w, y: i.y })
                    )
                    return updates
                }
                if (mode === "distribute-x") return distributeAlong(items, "x")
                if (mode === "distribute-y") return distributeAlong(items, "y")
                return updates
            }

            function commitPositionUpdates(updates) {
                if (!updates || !updates.size) return
                const batch = []
                for (const [key, pos] of updates.entries()) {
                    batch.push({
                        key: String(key || ""),
                        x: Math.round(Math.max(0, pos.x)),
                        y: Math.round(Math.max(0, pos.y)),
                    })
                }
                sync.sendOp({ type: "wb.items.batch", updates: batch })
            }

            function alignSelected(mode) {
                const items = getSelectedItemsForLayout()
                if (items.length < 2) return
                const metrics = computeGroupMetrics(items)
                const updates = computeAlignmentUpdates(
                    String(mode || ""),
                    items,
                    metrics
                )
                commitPositionUpdates(updates)
            }

            if (alignTopBtn)
                alignTopBtn.addEventListener("click", () =>
                    alignSelected("top")
                )
            if (alignMiddleYBtn)
                alignMiddleYBtn.addEventListener("click", () =>
                    alignSelected("middle-y")
                )
            if (alignBottomBtn)
                alignBottomBtn.addEventListener("click", () =>
                    alignSelected("bottom")
                )
            if (alignLeftBtn)
                alignLeftBtn.addEventListener("click", () =>
                    alignSelected("left")
                )
            if (alignMiddleXBtn)
                alignMiddleXBtn.addEventListener("click", () =>
                    alignSelected("middle-x")
                )
            if (alignRightBtn)
                alignRightBtn.addEventListener("click", () =>
                    alignSelected("right")
                )
            if (distributeXBtn)
                distributeXBtn.addEventListener("click", () =>
                    alignSelected("distribute-x")
                )
            if (distributeYBtn)
                distributeYBtn.addEventListener("click", () =>
                    alignSelected("distribute-y")
                )

            function connectNow({ updateUrl = true } = {}) {
                sync.setIdentity({
                    wsUrl: wsUrlEl.value,
                    sessionId: sessionEl.value,
                    username: usernameEl.value || "Anonym",
                })

                // Switching sessions should also switch local selection.
                restoreSelectionStateFromStorage()

                safeStorageSet(`${STORAGE_PREFIX}:wsUrl`, wsUrlEl.value)
                safeStorageSet(`${STORAGE_PREFIX}:sessionId`, sessionEl.value)
                safeStorageSet(`${STORAGE_PREFIX}:username`, usernameEl.value)

                if (updateUrl) {
                    setQueryParams({
                        ws: wsUrlEl.value,
                        session: sessionEl.value,
                        name: usernameEl.value,
                    })
                }

                sync.connect()
            }

            connectBtn.addEventListener("click", () => {
                connectNow({ updateUrl: true })
            })

            disconnectBtn.addEventListener("click", () => sync.disconnect())

            // Modal close handlers (same behavior as treemap/v4/index.html)
            const closeButton = document.querySelector(
                "#sectionModal .close-button"
            )
            if (closeButton) {
                closeButton.addEventListener("click", closeDetailsModal)
            }

            const modalEl = document.getElementById("sectionModal")
            if (modalEl) {
                modalEl.addEventListener("cancel", (event) => {
                    event.preventDefault()
                    closeDetailsModal()
                })

                // Click on backdrop closes
                modalEl.addEventListener("click", (event) => {
                    if (event.target === modalEl) closeDetailsModal()
                })
            }

            // Auto-connect on load (same behavior as treemap/v4/index.html)
            // so the persisted workspace state is loaded immediately.
            connectNow({ updateUrl: true })

            if (addTextFrameBtn) {
                addTextFrameBtn.addEventListener("click", () => {
                    const newId =
                        globalThis.crypto &&
                        typeof globalThis.crypto.randomUUID === "function"
                            ? `text::${globalThis.crypto.randomUUID()}`
                            : `text::${Date.now()}-${Math.random()
                                  .toString(16)
                                  .slice(2)}`

                    sync.sendOp({
                        type: "wb.text.create",
                        id: newId,
                        x: 220,
                        y: 60,
                        text: "",
                    })
                })
            }

            // Auto-reconnect after reload using persisted session settings.
            connectNow({ updateUrl: true })

            // Persist local inputs (per participant)
            if (wsUrlEl) {
                wsUrlEl.addEventListener("input", () => {
                    safeStorageSet(`${STORAGE_PREFIX}:wsUrl`, wsUrlEl.value)
                })
            }
            if (sessionEl) {
                sessionEl.addEventListener("input", () => {
                    safeStorageSet(
                        `${STORAGE_PREFIX}:sessionId`,
                        sessionEl.value
                    )
                })
            }
            if (usernameEl) {
                usernameEl.addEventListener("input", () => {
                    safeStorageSet(
                        `${STORAGE_PREFIX}:username`,
                        usernameEl.value
                    )
                })
            }

            // Initial render + Daten laden
            scheduleRender(sync.state)
            try {
                const items = await loadPruefschritte()
                criteriaById = new Map(items.map((c) => [c.id, c]))
                scheduleRender(sync.state)
            } catch (err) {
                console.error(err)
                boardTitleEl.textContent = "Fehler beim Laden der Prüfschritte."
            }
        </script>
    </body>
</html>
